manager:
  batch_size: 32
  per_beta: 0.4
  per_epsilon: 0.01

replay_buffer:
  capacity: 100000

distributed:
  capacity: 100000
  seed: null
  staleness_threshold_days: 1
  prioritization_alpha: 0.6

validation:
  required_length: 6
  enforce_numeric_reward: true
  enforce_boolean_done: true
  allow_none_state: false
  allow_none_next_state: false
  max_abs_reward: null

segment_tree:
  capacity: 100000
  dtype: float32

sequence_replay:
  capacity: 100000
  sequence_length: 16
  burn_in: 4
  min_episode_length: 2
  pad_value: 0.0
  seed: null

eviction:
  policy: fifo
  age_weight: 0.7
  reward_weight: 0.3

telemetry:
  enabled: true
  log_interval: 200

nstep:
  n_step: 3
  gamma: 0.99
  clear_on_terminal: true

reservoir:
  capacity: 100000
  seed: null
