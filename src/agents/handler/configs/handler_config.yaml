memory:
  max_checkpoints: 100
  max_telemetry_events: 1000
  max_postmortems: 1000
  default_checkpoint_ttl_seconds: 600
  default_telemetry_ttl_seconds: null
  default_postmortem_ttl_seconds: null
  max_checkpoint_state_chars: 200000
  max_checkpoint_metadata_chars: 20000
  max_event_chars: 80000
  max_query_results: 250
  copy_on_read: true
  sanitize_payloads: true
  mirror_to_shared_memory: false
  mirror_checkpoints_to_shared_memory: false
  mirror_telemetry_to_shared_memory: false
  mirror_postmortems_to_shared_memory: false
  require_shared_memory_when_mirroring: true
  shared_memory_checkpoint_ttl_seconds: 600
  shared_memory_telemetry_ttl_seconds: null
  shared_memory_postmortem_ttl_seconds: null
  error_policy:
    name: handler_memory.default
    expose_internal_messages: false
    include_context_in_public: false
    include_context_in_telemetry: true
    include_traceback_in_internal: false
    allow_critical_retry: false
    max_message_chars: 500
    max_context_depth: 4
    max_context_items: 50
    max_sequence_items: 20
    max_string_chars: 500
    redaction_text: "[REDACTED]"


adaptive_retry_policy:
  enabled: true

  # Core retry budget. Kept separate from HandlerPolicy's circuit breaker settings.
  # HandlerPolicy still decides whether an agent may be attempted at all.
  base_max_retries: 2
  min_retries: 0
  max_retries_cap: 4
  min_samples: 3
  default_history_limit: 500
  recent_window_seconds: 300

  # Historical outcome thresholds.
  high_success_rate_threshold: 0.70
  low_success_rate_threshold: 0.20
  recent_failure_rate_threshold: 0.85
  consecutive_failure_threshold: 3
  recent_failure_suppression_enabled: true
  low_confidence_penalty_enabled: true
  min_confidence_for_retry_bonus: 0.55
  confidence_floor: 0.35
  confidence_ceiling: 0.95

  # Retry modifiers. These are additive offsets applied to base_max_retries.
  severity_modifiers:
    low: 1
    medium: 0
    high: -1
    critical: -2

  category_modifiers:
    timeout: 1
    network: 1
    resource: 0
    unicode: 0
    memory: -1
    dependency: -1
    validation: -1
    security: -4
    runtime: 0

  action_modifiers:
    retry: 1
    degrade: -1
    escalate: -1
    fail_fast: -4
    quarantine: -4
    none: 0

  non_retryable_actions:
    - fail_fast
    - quarantine

  fail_fast_categories:
    - security

  # SLA-aware constraint. This does not replace SLARecoveryPolicy; it only caps
  # the retry budget when the available recovery budget is too small.
  respect_sla_budget: true
  default_remaining_budget_seconds: 30
  min_seconds_per_attempt: 1.5
  sla_safety_margin_seconds: 0.25

  # Backoff hints. HandlerAgent/recovery strategies may use the generated schedule.
  backoff_initial_seconds: 0.5
  backoff_multiplier: 2.0
  backoff_max_seconds: 8.0
  jitter_fraction: 0.15
  round_delay_digits: 3

  error_policy:
    name: adaptive_retry_policy.default
    expose_internal_messages: false
    include_context_in_public: false
    include_context_in_telemetry: true
    include_traceback_in_internal: false
    allow_critical_retry: false
    max_message_chars: 500
    max_context_depth: 4
    max_context_items: 50
    max_sequence_items: 20
    max_string_chars: 500
    redaction_text: "[REDACTED]"


escalation_manager:
  enabled: true
  schema_version: handler_escalation.v2
  handoff_type: handler_escalation.v2
  default_target_agent: planning_agent
  fallback_target_agent: planning_agent
  local_handler_agent: handler_agent
  default_reason: recovery_exhausted
  max_reason_chars: 240
  max_message_chars: 500
  max_context_fields: 12
  max_evidence_items: 10
  max_payload_chars: 120000
  emit_to_memory: false
  memory_event_type: handler_escalation
  include_public_error: true
  include_internal_evidence: true

  recovery_failed_statuses:
    - failed
    - skipped
    - unknown
  degraded_statuses:
    - degraded
  escalate_degraded_high_severity: true
  low_sla_budget_seconds: 3.0
  sla_priority_floor: p1

  escalation_matrix:
    critical:
      retryable: safety_agent
      non_retryable: planning_agent
    high:
      retryable: planning_agent
      non_retryable: evaluation_agent
    medium:
      retryable: handler_agent
      non_retryable: planning_agent
    low:
      retryable: handler_agent
      non_retryable: handler_agent

  action_routes:
    quarantine: safety_agent
    fail_fast: planning_agent
    escalate: planning_agent
    degrade: handler_agent
    retry: handler_agent
    none: planning_agent

  category_routes:
    security: safety_agent
    dependency: planning_agent
    memory: planning_agent
    sla: planning_agent
    validation: evaluation_agent

  recommendation_routes:
    quarantine_security_failure: safety_agent
    immediate_escalation: planning_agent
    collect_context_and_escalate: planning_agent
    open_circuit_or_failover: planning_agent
    validate_runtime_dependencies: planning_agent
    validate_payload_and_schema: evaluation_agent
    preserve_sla_and_fast_failover: planning_agent

  priority_by_severity:
    critical: p0
    high: p1
    medium: p2
    low: p3

  level_by_priority:
    p0: page
    p1: urgent_handoff
    p2: standard_handoff
    p3: informational

  ack_by_priority:
    p0: true
    p1: true
    p2: false
    p3: false

  target_overrides: {}

  error_policy:
    name: escalation_manager.default
    expose_internal_messages: false
    include_context_in_public: false
    include_context_in_telemetry: true
    include_traceback_in_internal: false
    allow_critical_retry: false
    max_message_chars: 500
    max_context_depth: 4
    max_context_items: 50
    max_sequence_items: 20
    max_string_chars: 500
    redaction_text: "[REDACTED]"


intelligence:
