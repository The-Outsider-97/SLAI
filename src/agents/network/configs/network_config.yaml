      initial_backoff_ms: 250
      max_backoff_ms: 5000
      backoff_multiplier: 2.0
      backoff_strategy: "exponential"
      jitter_ratio: 0.20
      jitter_mode: "full"
      retry_on_timeouts: true
      retry_on_connection_errors: true
      retry_on_rate_limits: true
      retry_on_server_errors: true
      retry_on_unknown_errors: false
      retry_on_duplicate_active: false
      respect_retry_after: true
      failover_on_required_disposition: true
      allow_retry_when_non_idempotent: false
      retryable_status_codes: [408, 409, 425, 429, 500, 502, 503, 504]
      non_retryable_status_codes: [400, 401, 403, 404, 405, 410, 413, 422]

    aggressive:
      max_attempts: 5
      initial_backoff_ms: 150
      max_backoff_ms: 3000
      backoff_multiplier: 1.8
      backoff_strategy: "exponential"
      jitter_ratio: 0.25
      jitter_mode: "full"
      retry_on_timeouts: true
      retry_on_connection_errors: true
      retry_on_rate_limits: true
      retry_on_server_errors: true
      retry_on_unknown_errors: true
      retry_on_duplicate_active: false
      respect_retry_after: true
      failover_on_required_disposition: true
      allow_retry_when_non_idempotent: false
      retryable_status_codes: [408, 409, 425, 429, 500, 502, 503, 504]
      non_retryable_status_codes: [400, 401, 403, 404, 405, 410, 413, 422]

    conservative:
      max_attempts: 2
      initial_backoff_ms: 500
      max_backoff_ms: 8000
      backoff_multiplier: 2.0
      backoff_strategy: "exponential"
      jitter_ratio: 0.10
      jitter_mode: "equal"
      retry_on_timeouts: true
      retry_on_connection_errors: true
      retry_on_rate_limits: true
      retry_on_server_errors: true
      retry_on_unknown_errors: false
      retry_on_duplicate_active: false
      respect_retry_after: true
      failover_on_required_disposition: true
      allow_retry_when_non_idempotent: false
      retryable_status_codes: [408, 425, 429, 500, 502, 503, 504]
      non_retryable_status_codes: [400, 401, 403, 404, 405, 409, 410, 413, 422]

    streaming:
