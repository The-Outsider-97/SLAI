  terminal_states: ["acked", "expired", "dead_lettered", "cancelled"]
  active_states: ["initialized", "queued", "selected", "sent", "received", "retrying", "failed", "nacked"]
  state_order: ["initialized", "queued", "selected", "sent", "received", "acked", "nacked", "retrying", "failed", "expired", "dead_lettered", "cancelled"]

  allowed_transitions:
    initialized: ["queued", "selected", "failed", "expired", "cancelled"]
    queued: ["selected", "sent", "failed", "expired", "cancelled"]
    selected: ["queued", "sent", "failed", "expired", "cancelled"]
    sent: ["received", "acked", "nacked", "retrying", "failed", "expired", "dead_lettered"]
    received: ["acked", "nacked", "retrying", "failed", "expired", "dead_lettered"]
    nacked: ["retrying", "queued", "failed", "dead_lettered", "expired"]
    retrying: ["queued", "selected", "sent", "failed", "dead_lettered", "expired"]
    failed: ["retrying", "queued", "dead_lettered", "expired"]
    acked: []
    expired: []
    dead_lettered: []
    cancelled: []


