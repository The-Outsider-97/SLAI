network_adapters:
  enabled: true
  sanitize_logs: true
  auto_register_defaults: true
  reuse_adapter_instances: true
  close_replaced_instances: true
  record_registry_snapshots: true
  require_registered_adapter: true
  prefer_connected_instances: true
  prefer_secure_for_tls_endpoints: true

  default_adapter: "http"
  default_protocol: "http"
  default_channel: "http"
  selection_strategy: "priority"

  max_active_adapters: 64
  registry_snapshot_ttl_seconds: 1800
  active_snapshot_ttl_seconds: 600
  event_history_max: 250

  priority_order: ["http", "websocket", "grpc", "queue"]

  adapter_defaults:
    http:
      enabled: true
      priority: 140
      reuse_instances: true
      config_section: "network_http_adapter"
      protocols: ["http", "https"]
      channels: ["http"]
      aliases: ["rest"]

    websocket:
      enabled: true
      priority: 130
      reuse_instances: true
      config_section: "network_websocket_adapter"
      protocols: ["websocket", "ws", "wss"]
      channels: ["websocket"]
      aliases: ["ws", "wss", "socket"]

    grpc:
      enabled: true
      priority: 120
      reuse_instances: true
      config_section: "network_grpc_adapter"
      protocols: ["grpc", "grpcs"]
      channels: ["grpc"]
      aliases: ["rpc"]

    queue:
      enabled: true
      priority: 110
      reuse_instances: true
      config_section: "network_queue_adapter"
      protocols: ["queue", "amqp", "amqps", "mq", "sqs", "kafka", "pubsub"]
      channels: ["queue"]
      aliases: ["broker", "mq"]


