    - '(?i)(?:^|[_\-.])(api[_\-.]?key|token|secret|password|passwd|pwd|credential|authorization|auth|cookie|session|private[_\-.]?key|access[_\-.]?key|refresh[_\-.]?token|client[_\-.]?secret)(?:$|[_\-.])'
    - '(?i)(?:bearer|oauth|jwt|csrf|xsrf)'
