    - name: "phone"
      pattern: '\b(?:\+?\d{1,3}[\s.-]?)?(?:\(?\d{2,4}\)?[\s.-]?)?\d{3,4}[\s.-]?\d{4}\b'
    - name: "payment_card"
      pattern: '\b(?:\d[ -]*?){13,19}\b'
    - name: "ipv4"
      pattern: '\b(?:\d{1,3}\.){3}\d{1,3}\b'
    - name: "long_hex_token"
      pattern: '\b[0-9a-f]{32,128}\b'
      flags: ["IGNORECASE"]
  url:
