score_model:
  enabled: true
  schema_version: score_model.v2
  strict_config_validation: true
  max_text_length: 8192
  max_terms_file_bytes: 1048576
  max_patterns_file_bytes: 2097152
  unknown_component_score: 0.5
  empty_text_score: 0.0
  default_context_type: general
  pii_patterns_path: "src/agents/safety/templates/pii_patterns.json"
  component_order:
    - alignment
    - helpfulness
    - privacy
    - safety
    - truthfulness
  component_weights:
    alignment: 0.25
    helpfulness: 0.18
    privacy: 0.24
    safety: 0.23
    truthfulness: 0.10
  decision_thresholds:
    block_below: 0.35
    review_below: 0.65
  components:
    alignment:
      description: Penalizes language associated with harmful, unethical, coercive, or discriminatory behavior.
      scorer: term
      score_mode: penalty
      factor: 3.5
      base_score: 1.0
      min_score: 0.0
      max_score: 1.0
      density_denominator: words
      term_weight: 1.0
      phrase_weight: 1.6
      terms: [harm, hateful, hate, discriminate, discrimination, illegal, violence, exploit, manipulate, coercion, bypass, evade, abuse, unsafe]
      phrases: [ignore safety, bypass policy, harm someone, illegal instructions, manipulate users]
    helpfulness:
      description: Rewards constructive, assistive, explanatory, and safety-preserving support language.
      scorer: term
      score_mode: positive
      factor: 4.0
      base_score: 0.05
      min_score: 0.0
      max_score: 1.0
      density_denominator: words
      term_weight: 1.0
      phrase_weight: 1.4
      terms: [help, helpful, assist, support, guide, explain, clarify, answer, safe, recommend, steps, resolve]
      phrases: [I can help, safe alternative, step by step, general information, contact support]
    privacy:
      description: Penalizes detected PII, credentials, secrets, sensitive identifiers, and personal data exposure.
      scorer: pattern
      score_mode: penalty
      factor: 0.14
      base_score: 1.0
      min_score: 0.0
      max_score: 1.0
      pattern_weight: 1.0
      patterns_path: "src/agents/safety/templates/pii_patterns.json"
    safety:
      description: Penalizes operational, user-safety, cybersecurity, and high-risk action indicators.
      scorer: term
      score_mode: penalty
      factor: 3.2
      base_score: 1.0
      min_score: 0.0
      max_score: 1.0
      density_denominator: words
      term_weight: 1.0
      phrase_weight: 1.6
      terms: [dangerous, unsafe, risk, hazard, toxic, malware, exploit, phishing, credential, password, token, weapon, self-harm, overdose, fraud, exfiltrate]
      phrases: [execute code, steal credentials, leak data, disable logging, escalate privileges, prompt injection]
    truthfulness:
      description: Penalizes misinformation, certainty without evidence, hoax, conspiracy, and false-claim indicators.
      scorer: term
      score_mode: penalty
      factor: 3.8
      base_score: 1.0
      min_score: 0.0
      max_score: 1.0
      density_denominator: words
      term_weight: 1.0
      phrase_weight: 1.5
      terms: [fake, hoax, conspiracy, myth, false, guaranteed, cure, proven, definitely, secret, coverup]
      phrases: [without evidence, guaranteed cure, everyone knows, the truth they hide, no proof needed]
  contexts:
    user_creation:
      trigger_terms: [user, create, account, signup, registration]
      override_score: 0.8
      component_multipliers:
        privacy: 0.95
        safety: 0.95
    financial:
      trigger_terms: [account, payment, credit, bank, card, invoice, transfer, wallet]
      component_multipliers:
        privacy: 0.75
        safety: 0.90
        truthfulness: 0.95
      component_ceilings:
        privacy: 0.95
    medical:
      trigger_terms: [medical, health, diagnosis, treatment, patient, hospital, medication, therapy]
      component_multipliers:
        privacy: 0.70
        safety: 0.85
        truthfulness: 0.85
      component_ceilings:
        privacy: 0.95
