    - '(?i)(?:^|[_\-.])(user[_\-.]?id|subject[_\-.]?id|account[_\-.]?id|actor[_\-.]?id|tenant[_\-.]?id|session[_\-.]?id|request[_\-.]?id|trace[_\-.]?id|correlation[_\-.]?id|email|phone|ip|source[_\-.]?ip)(?:$|[_\-.])'
  redaction_patterns:
    - name: "authorization_header"
      pattern: '(?i)authorization\s*:\s*(?:basic|bearer)\s+[A-Za-z0-9._~+/=-]+'
    - name: "bearer_token"
      pattern: '(?i)\bbearer\s+[A-Za-z0-9._~+/=-]+'
    - name: "api_key_assignment"
      pattern: "(?i)\\b(api[_-]?key|secret|token|password|passwd)\\s*[:=]\\s*['\"]?[^\\s,'\"]+"
    - name: "private_key"
      pattern: '-----BEGIN [A-Z0-9 ]*PRIVATE KEY-----.*?-----END [A-Z0-9 ]*PRIVATE KEY-----'
