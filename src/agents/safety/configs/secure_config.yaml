adaptive_security:
  schema_version: adaptive_security.v3
  rate_limit: 30
  rate_limit_window_seconds: 60
  rate_limit_tracker_maxlen: 200
  input_size_limit: 65536
  max_text_length: 4096
  max_url_length: 2048
  phishing_threshold: 0.75
  review_threshold: 0.5
  block_threshold: 0.75
  indicator_threshold: 0.65
  email_model_path: src/agents/safety/models/email_phishing_model.json
  url_model_path: src/agents/safety/models/url_phishing_model.json
  client_ip_headers:
  - X-Forwarded-For
  - X-Real-IP
  - CF-Connecting-IP
  default_client_ip: 127.0.0.1
  financial_brand_indicators:
  - bank
  - paypal
  - stripe
  - visa
  - mastercard
  - wire
  - payment
  - invoice
  - account
  feature_schema:
    email_num_inputs: 11
    url_num_inputs: 8
  email_layer_config:
  - neurons: 16
    activation: relu
    dropout: 0.2
    init: he_normal
    batch_norm: true
  - neurons: 8
    activation: relu
    dropout: 0.1
    init: he_normal
    batch_norm: true
  - neurons: 1
    activation: sigmoid
    dropout: 0.0
    init: xavier_uniform
    batch_norm: false
  url_layer_config:
  - neurons: 12
    activation: relu
    dropout: 0.15
    init: he_normal
    batch_norm: true
  - neurons: 6
    activation: relu
    dropout: 0.1
    init: he_normal
    batch_norm: true
  - neurons: 1
    activation: sigmoid
    dropout: 0.0
    init: xavier_uniform
    batch_norm: false
  model_defaults:
    loss_function_name: cross_entropy
    optimizer_name: adam
    problem_type: binary_classification
  model_loading:
    allow_untrained_fallback: true
    verify_on_load: true
  score_weights:
    model: 0.7
    heuristic: 0.3
  email_heuristic_weights:
    suspicious_keywords: 0.15
    urgent_language: 0.15
    attachment: 0.12
    domain_mismatch: 0.22
    unusual_sender: 0.25
    unusual_time: 0.06
  url_heuristic_weights:
    entropy: 0.14
    subdomains: 0.1
    contains_ip: 0.2
    missing_https: 0.12
    redirects: 0.12
    domain_age: 0.14
    special_chars: 0.08
  threat_thresholds:
    email:
      long_url_length: 60.0
      apt_score: 0.65
    url:
      high_entropy: 0.65
      apt_entropy: 0.55
  domain_age:
    enable_whois: false
    cache_enabled: true
    cache_ttl_seconds: 86400
    new_domain_days: 30
    young_domain_days: 365
    new_domain_score: 0.9
    young_domain_score: 0.55
    established_domain_score: 0.1
    unknown_score: 0.5
    established_tlds:
    - com
    - org
    - net
    - edu
    - gov
    suspicious_tlds:
    - xyz
    - top
    - icu
    - cyou
    - rest
    - shop
    - cc
    - click
    - zip
    established_tld_score: 0.2
    suspicious_tld_score: 0.8
    tld_scores:
      example: 0.5
  traffic:
    payload_size_limit: 8192
  trusted_hashes: {}
  supply_chain:
    hash_algorithm: sha256
    chunk_size: 65536
    max_file_bytes: 10485760
    max_hash_file_bytes: 262144
    block_unknown_hash: true
    allowed_extensions:
    - .py
    - .json
    - .yaml
    - .yml
    - .txt
    - .bin
    - .dll
    - .so
    - .dylib
    - .whl
    - .tar
    - .gz
    - .zip
  training:
    epochs: 50
    learning_rate: 0.001
    batch_size: 32
    max_samples: 10000
    verbose: false
    print_every_n_epochs: 10
    save_best_model: true
    save_final_model: true
  memory:
    store_analysis: true
    analysis_tags:
    - adaptive_security
    - analysis
    analysis_sensitivity: 0.7
    analysis_ttl_seconds: 86400
    store_model_events: true
    model_event_tags:
    - adaptive_security
    - model
    model_event_sensitivity: 0.65
    domain_age_sensitivity: 0.3
    fail_closed_on_store_error: false


attention_monitor:
  schema_version: attention_monitor.v3
  entropy_threshold: 2.5
  uniformity_threshold: 0.25
  anomaly_threshold: 0.7
  review_threshold: 0.45
  anomaly_detection: true
  store_analysis: true
  recent_analysis_max: 250
  tensor_validation:
    max_dimensions: 4
    max_elements: 4000000
    allow_negative: false
    normalize_rows: true
    require_square: true
  security:
    low_entropy_multiplier: 0.7
    high_uniformity_multiplier: 1.5
    sharp_focus_threshold: 0.95
    diagonal_dominance_threshold: 0.8
    diffuse_entropy_threshold: 0.9
    head_dominance_threshold: 0.75
  anomaly_weights:
    entropy_low: 0.22
    entropy_high: 0.12
    uniformity: 0.18
    dispersion: 0.12
    sharp_focus: 0.16
    diagonal_dominance: 0.1
    head_dominance: 0.1
  visualization:
    enabled: true
    allow_manual_call: true
    max_dimension: 128
    figure_size:
    - 8
    - 6
    dpi: 120
    title: Attention Heatmap
  reports:
    include_context: false
    include_visualization: false
  memory:
    analysis_tags:
    - attention_analysis
    - security
    - interpretability
    analysis_sensitivity: 0.65
    analysis_ttl_seconds: 86400
    classification: confidential
    store_visualization: false 


compliance_checker:
  compliance_file_path: src/agents/safety/templates/safety_compliance.json
  phishing_model_path: src/agents/safety/models/phishing_model.json
  enable_memory_bootstrap: true
  report_thresholds:
    critical: 0.8
    warning: 0.9
  weights:
    data_privacy: 0.35
    model_security: 0.25
    application_security: 0.2
    operations: 0.2
  identity_markers_for_harassment:
  - gender
  - race
  - religion
  - orientation
  - nationality
  - ethnicity
  - disability
  - political affiliation
  - social class
  max_framework_bytes: 1048576
  default_owner: security_compliance
  gdpr:
    partial_score_threshold: 0.75
  reporting:
    max_findings_per_control: 4
  memory:
    framework_sensitivity: 0.8
    evaluation_sensitivity: 0.7
    evaluation_ttl_seconds: 86400
    evaluation_tags:
    - compliance_evaluation
    - security
    - governance
  control_requirements:
    data_classification:
      required_fields:
      - email.body
      - training_features_url
      - log_entries
      allowed_labels:
      - Confidential
      - Restricted
      - Internal
    data_minimization:
      max_features: 30
      input_size_limit: 2024
    application_security:
      required_config_sections:
      - adaptive_security
      - safety_guard
      - security_error
      - secure_memory
  model_integrity:
    hash_algorithm: sha256
    max_model_bytes: 20000000
    model_paths: {}
    trusted_hashes: {}
  framework:
    documentInfo:
      name: Safety Agent Compliance Framework
      version: '3.0'
      last_updated: YYYY-MM-DD
      owner: security_compliance
    sections:
    - sectionId: data_privacy
      title: Data Privacy and Protection Controls
      weight: 0.35
      controls:
      - controlId: DP-001
        objective: Classify sensitive data processed by the safety subsystem.
        owner: privacy_security
        severity: high
        required_fields:
        - email.body
        - training_features_url
        - log_entries
        allowed_labels:
        - Confidential
        - Restricted
        - Internal
        tags:
        - privacy
        - classification
        remediation:
        - Define approved labels for all sensitive safety-agent data assets.
      - controlId: DP-002
        objective: Validate GDPR principles including consent, purpose limitation,
          minimization, subject rights, and retention.
        owner: privacy_security
        severity: high
        tags:
        - privacy
        - gdpr
        remediation:
        - Restore consent, purpose, subject-rights, minimization, and retention evidence.
      - controlId: DP-003
        objective: Confirm feature extraction follows data minimization requirements.
        owner: safety_engineering
        severity: medium
        max_features: 30
        tags:
        - privacy
        - data_minimization
        remediation:
        - Reduce extracted features or justify additional collection.
      - controlId: PR-001
        objective: Verify audit/log redaction does not expose secrets or personal
          data.
        owner: security_engineering
        severity: high
        tags:
        - privacy
        - redaction
        remediation:
        - Repair redaction patterns and rerun privacy leakage tests.
    - sectionId: model_security
      title: Model Security and Integrity Controls
      weight: 0.25
      controls:
      - controlId: MS-001
        objective: Verify phishing model artifacts against trusted cryptographic hashes.
        owner: model_security
        severity: critical
        tags:
        - model_security
        - integrity
        remediation:
        - Restore model artifacts from signed trusted sources and update trusted hashes
          through change control.
    - sectionId: application_security
      title: Application Security Controls
      weight: 0.2
      controls:
      - controlId: AS-001
        objective: Verify safety application security configuration is present for
          core subsystems.
        owner: appsec
        severity: medium
        required_config_sections:
        - adaptive_security
        - safety_guard
        - security_error
        - secure_memory
        tags:
        - appsec
        - configuration
        remediation:
        - Restore missing secure_config.yaml sections and validate configuration shape.
    - sectionId: operations
      title: Operational Security Controls
      weight: 0.2
      controls:
      - controlId: OS-001
        objective: Verify operational compliance evidence exists in secure memory.
        owner: security_operations
        severity: medium
        tags:
        - operations
        - memory
        remediation:
        - Bootstrap or refresh operational security evidence in SecureMemory.
      - controlId: AL-001
        objective: Verify audit access logging interface is available.
        owner: security_operations
        severity: high
        tags:
        - audit
        - observability
        remediation:
        - Repair secure-memory audit logging and rerun compliance evaluation.


cyber_safety:
  schema_version: cyber_safety.v3
  cyber_rules_path: "src/agents/safety/templates/cyber_rules.json"
  vulnerability_signatures_path: "src/agents/safety/templates/vulnerability_signatures.json"
  anomaly_threshold: 3.0
  max_log_history: 1000
  max_input_text_length: 65536
  input_size_limit: 65536
  qnn_inspired_anomaly: true
  qnn_feature_dim: 8
  adaptive_centroid_lr: 0.01
  resource_loading:
    max_json_bytes: 1048576
    strict_pattern_validation: true
  risk_thresholds:
    review: 0.5
    block: 0.75
    event_review: 0.5
    event_block: 0.85
  risk_weights:
    input:
      rules: 0.35
      vulnerabilities: 0.35
      context: 0.1
      model: 0.2
  context_risk:
    default: 0.0
    length_weight: 0.2
    api_request: 0.15
    code_review: 0.2
    config_file: 0.2
    user_prompt: 0.1
    log_event: 0.15
  fail_closed:
    raise_on_block: false
  detection:
    max_matches_per_rule: 25
    max_recommendations: 12
  model:
    enabled: true
    model_path: "src/agents/safety/models/cyber_safety_model.json"
    allow_untrained_fallback: true
    fail_closed_on_prediction_error: false
    num_inputs: 8
    feature_order:
      - length
      - entropy
      - finding_count
      - max_severity
      - secret_exposure_count
      - injection_count
      - vulnerability_count
      - context_risk
    finding_count_scale: 10.0
    loss_function_name: cross_entropy
    optimizer_name: adam
    problem_type: binary_classification
    initialization_method_default: he_normal
    layer_config:
      - neurons: 16
        activation: relu
        dropout: 0.2
        init: he_normal
        batch_norm: true
      - neurons: 8
        activation: relu
        dropout: 0.1
        init: he_normal
        batch_norm: true
      - neurons: 1
        activation: sigmoid
        dropout: 0.0
        init: xavier_uniform
        batch_norm: false
    neural_network_overrides:
      default_dropout_rate: 0.1
      default_use_batch_norm: true
      default_bn_momentum: 0.9
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_epsilon: 0.0000001
      gradient_clip_value: 1.0
      weight_decay_lambda: 0.00001
  security_rules:
    principles:
      - Enforce least privilege
      - Validate and sanitize untrusted input
      - Secure configuration by default
      - Maintain auditability and non-repudiation
      - Use defense in depth
      - Fail securely
      - Rotate and protect secrets
    patterns:
      - name: Sensitive Keyword or Credential
        category: data_privacy
        regex_list:
          - '(?:api_key|apikey|secret|password|passwd|private_key|client_secret|access_token|refresh_token)\s*[:=]\s*[\w\-/+.~!@#$%^&*()=]{8,}'
          - 'ssh-(?:rsa|dss|ed25519)\s+AAAA[A-Za-z0-9+/=]+'
          - '(?:aws_access_key_id|aws_secret_access_key)\s*[:=]\s*[\w/+]{12,}'
          - 'bearer\s+[\w\-._~+/]+=*'
          - '\b\d{4}[- ]?\d{4}[- ]?\d{4}[- ]?\d{4}\b'
        severity: 0.8
        confidence: 0.86
        remediation: "Remove secrets from the payload, rotate exposed credentials, and verify secret-scanning controls."
        tags: [secret_exposure, privacy, credential]
      - name: Weak Password Pattern
        category: access_authorization
        regex_list:
          - '^password$'
          - '^123456$'
          - '^qwerty$'
          - '^admin$'
          - '^root$'
          - '(\w)\1{3,}'
          - '^(?:0123|1234|2345|3456|4567|5678|6789|7890|qwer|asdf|zxcv)+$'
        severity: 0.55
        confidence: 0.7
        remediation: "Reject weak credentials and enforce password or passphrase policy with adaptive authentication."
        tags: [weak_authentication]
      - name: Potential Injection Attempt
        category: cyber_threat
        regex_list:
          - "('|--|;|\\bUNION\\b|\\bSELECT\\b.*\\b(?:FROM|WHERE)\\b|\\bSLEEP\\s*\\(|\\bWAITFOR\\s+DELAY)"
          - '(&&|\|\||;|%0A|%0D|\$\(|`.*`)'
          - '(\n|\r|%0a|%0d).*(?:login|password|session|token)'
          - '<script>|<img\s+src\s*=\s*javascript:|onerror\s*='
        severity: 0.9
        confidence: 0.82
        remediation: "Apply strict input validation, parameterized execution, output encoding, and request isolation."
        tags: [injection, xss, sqli, command_injection]
  pattern_sources:
    - name: PII and Secret Patterns
      path: "src/agents/safety/templates/pii_patterns.json"
      category: data_privacy
      severity: 0.75
      confidence: 0.8
      required: false
      remediation: "Redact or minimize sensitive data before storage, logging, model input, or downstream processing."
      tags: [pii, privacy, secret_scanning]
    - name: Toxicity and Harmful Content Patterns
      path: "src/agents/safety/templates/toxicity_detection_patterns.json"
      category: content_output_safety
      severity: 0.7
      confidence: 0.72
      required: false
      remediation: "Route harmful content through user-safety controls and avoid unsafe downstream actions."
      tags: [toxicity, content_safety, user_safety]
    - name: Prompt Manipulation Patterns
      path: "src/agents/safety/templates/manipulation_patterns.json"
      category: prompt_security
      severity: 0.78
      confidence: 0.78
      required: false
      remediation: "Reject or sandbox prompt-injection and manipulation attempts before privileged tool use."
      tags: [prompt_injection, jailbreak, llm_security]
  vulnerability_signatures: {}
  contextual_heuristics:
    code_review:
      - name: Unsafe Code Execution
        category: execution_operational_safety
        pattern: '\b(eval|exec|compile)\s*\(|\bsubprocess\.(?:call|run|Popen)\s*\(|\bos\.system\s*\('
        severity: 0.75
        confidence: 0.75
        description: "Potential unsafe code execution primitive detected."
        remediation: "Sandbox or remove dynamic execution and enforce least privilege."
        tags: [unsafe_execution, code_review]
    config_file:
      - name: Debug Enabled
        category: system_integrity
        pattern: '\bdebug\s*[:=]\s*true\b|\bshow_stacktrace\s*[:=]\s*true\b'
        severity: 0.45
        confidence: 0.7
        description: "Debug or stack-trace exposure appears enabled."
        remediation: "Disable verbose debugging in production and verify error redaction."
        tags: [configuration, information_disclosure]
      - name: Default Credentials
        category: access_authorization
        pattern: '(?:user|username|password)\s*[:=]\s*(?:admin|root|password|changeme|default)'
        severity: 0.7
        confidence: 0.8
        description: "Default credentials may be present in configuration."
        remediation: "Remove default credentials and rotate any exposed secret."
        tags: [weak_authentication, configuration]
    api_request:
      - name: Verbose Error Request
        category: information_disclosure
        pattern: '\b(verbose|debug|show_stacktrace|trace)\s*=\s*true\b'
        severity: 0.35
        confidence: 0.65
        description: "Request appears to ask for verbose diagnostic output."
        remediation: "Return user-safe errors only and suppress internal stack traces."
        tags: [information_disclosure, api_security]
    global:
      - name: Path Traversal Indicator
        category: cyber_threat
        pattern: '(\.\./|\.\.\\|%2e%2e%2f|%252e%252e%252f)'
        severity: 0.8
        confidence: 0.8
        description: "Path traversal indicator detected."
        remediation: "Normalize paths, enforce allowlisted roots, and reject traversal sequences."
        tags: [path_traversal, input_validation]
  event_stream:
    min_stat_samples: 30
    sequence_window: 10
    min_sequence_length: 3
    sequence_novelty_weight: 5.0
    feature_scale: 1000.0
    qnn_distance_scale: 2.5
  threat_modeling:
    category_weights:
      Spoofing: 0.5
      Tampering: 0.65
      Repudiation: 0.35
      InformationDisclosure: 0.6
      DenialOfService: 0.45
      ElevationOfPrivilege: 0.8
    rules:
      - category: Spoofing
        description: "Identity or client spoofing may be possible for authentication/API surfaces."
        component_patterns: [login, auth, api]
        action_patterns: [authenticate, login, verify]
        network_zone_patterns: [internet, external]
      - category: Tampering
        description: "Unauthorized data, configuration, or state modification could occur."
        component_patterns: [config, database, storage, role, permission]
        action_patterns: [update, write, modify, upload, delete]
      - category: Repudiation
        description: "Critical action may lack sufficient auditability or non-repudiation evidence."
        action_patterns: [delete, critical, transaction, approve]
        context_patterns: [audit_missing, log_disabled]
      - category: InformationDisclosure
        description: "Sensitive data or internal details may be exposed."
        data_patterns: [password, secret, token, key, credit_card, ssn, error_details]
        component_patterns: [database, api, logs]
      - category: DenialOfService
        description: "Internet-facing resource may be susceptible to exhaustion or flooding."
        component_patterns: [api, login, upload, search]
        network_zone_patterns: [internet, external]
      - category: ElevationOfPrivilege
        description: "Privilege escalation may be possible through role, permission, or elevated execution paths."
        component_patterns: [admin, role, permission, sudo, iam]
        action_patterns: [run_as, sudo, update_role, grant, escalate]
    mitigations:
      Spoofing: ["Enforce MFA, session binding, token validation, and anti-replay controls."]
      Tampering: ["Use integrity checks, least privilege, signed changes, and server-side authorization."]
      Repudiation: ["Write tamper-evident audit logs with actor, action, and correlation identifiers."]
      InformationDisclosure: ["Minimize sensitive data, redact logs, encrypt secrets, and suppress verbose errors."]
      DenialOfService: ["Apply rate limits, quotas, circuit breakers, and resource isolation."]
      ElevationOfPrivilege: ["Enforce object-level authorization, role review, and privileged-action approval."]
  memory:
    store_analysis: true
    analysis_tags: [cyber_safety, analysis]
    analysis_ttl_seconds: 86400
    input_analysis_sensitivity: 0.75
    event_analysis_sensitivity: 0.65
    threat_assessment_sensitivity: 0.55
    fail_closed_on_store_error: false


neural_network:
  enabled: true
  schema_version: safety_neural_network.model.v3
  environment: production
  model_family: native_mlp
  initialization_method_default: he_normal
  default_dropout_rate: 0.1
  default_use_batch_norm: true
  default_bn_momentum: 0.9
  default_bn_epsilon: 0.00001
  default_activation_alpha: 0.01
  loss_function_name: cross_entropy
  optimizer_name: adam
  problem_type: binary_classification
  binary_threshold: 0.5
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 0.0000001
  momentum_coefficient: 0.9
  adagrad_epsilon: 0.0000001
  weight_decay_lambda: 0.00001
  gradient_clip_value: 1.0
  learning_rate_floor: 0.00000001
  learning_rate_ceiling: 1.0
  max_epochs: 10000
  max_batch_size: 4096
  max_training_samples: 250000
  shuffle_training_data: true
  deterministic_seed: 1337
  set_seed_on_init: true
  strict_numerics: true
  fail_on_non_finite: true
  save_best_requires_validation: false
  persistence:
    model_dir: src/agents/safety/models
    atomic_write: true
    write_backup: true
    include_optimizer_state: true
    include_training_history: true
    signature_hash_algorithm: sha256
    signature_salt: GAIA-NEURAL-NETWORK-SIGNATURE-SALT
    require_signature_on_load: true
    max_model_file_bytes: 10485760
  telemetry:
    enabled: true
    redact_payloads: true
    history_limit: 500
    log_every_n_epochs: 10
    include_layer_stats: true
  layers:
    - neurons: 16
      activation: relu
      init: he_normal
      dropout: 0.2
      batch_norm: true
    - neurons: 8
      activation: relu
      init: he_normal
      dropout: 0.1
      batch_norm: true
    - neurons: 1
      activation: sigmoid


reward_model:
  enabled: true
  schema_version: "reward_model.evaluation.v3"
  strict_config_validation: true
  max_text_length: 8192
  default_context_type: default
  components:
    - alignment
    - helpfulness
    - privacy
    - safety
    - truthfulness
  weights:
    alignment: 0.30
    helpfulness: 0.20
    privacy: 0.20
    safety: 0.20
    truthfulness: 0.10
    learned: 0.0
    attention_quality: 0.0
    attention_stability: 0.0
  normalize_weights: true
  thresholds:
    review_risk: 0.45
    block_risk: 0.72
  confidence:
    base: 0.88
    block_multiplier: 0.95
    attention_multiplier: 1.0
    learned_model_multiplier: 1.0
  context_weights:
    user_creation:
      component_multipliers:
        helpfulness: 1.05
        privacy: 0.95
      component_floors:
        helpfulness: 0.20
    financial:
      component_multipliers:
        privacy: 0.75
        safety: 0.90
      component_ceilings:
        privacy: 0.95
    medical:
      component_multipliers:
        privacy: 0.70
        truthfulness: 0.90
      component_ceilings:
        privacy: 0.95
    cyber_security:
      component_multipliers:
        safety: 0.85
        privacy: 0.85
  attention:
    enabled: true
    uniformity_divisor: 2.0
  learned_model:
    enabled: true
    default_score: 0.0
    load_from_memory: true
    min_training_samples: 10
    max_training_samples: 5000
    ridge_lambda: 0.0001
  history:
    default_days: 7
    max_records: 1000
    time_ranges:
      1d: 1
      7d: 7
      30d: 30
      90d: 90
  report:
    history_range: 30d
    include_markdown: true
  memory:
    store_evaluations: true
    store_score_report: true
    store_rule_definitions: true
    store_initial_weights: true
    use_stored_rule_weights: false
    evaluation_tags:
