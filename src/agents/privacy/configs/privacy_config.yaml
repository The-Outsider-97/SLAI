data_id:
  enabled: true
  strict_mode: true
  sanitize_freeform_context: true
  record_decisions_in_memory: true
  write_shared_contract: true
  default_policy_version: v1
  default_decision_stage: identification.runtime_gate
  default_text_stage: identification.text_scan
  max_depth: 12
  max_collection_items: 500
  max_matches: 500
  max_attribute_tags: 200
  max_context_preview: 48
  min_regex_confidence: 0.72
  min_field_confidence: 0.63
  min_keyword_confidence: 0.58
  escalation_uncertainty_threshold: 0.22
  medium_sensitivity_threshold: 0.35
  high_sensitivity_threshold: 0.6
  critical_sensitivity_threshold: 0.85
  defaults_dir: "templates/privacy_defaults.json"
  regex_patterns:
    email: \b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b
    phone: (?:(?<!\w)(?:\+?\d{1,3}[\s.-]?)?(?:\(?\d{2,4}\)?[\s.-]?)?\d{3}[\s.-]?\d{4}(?!\w))
    ssn: \b\d{3}-\d{2}-\d{4}\b
    credit_card: \b(?:\d[ -]*?){13,19}\b
    ipv4: \b(?:\d{1,3}\.){3}\d{1,3}\b
    passport: \b[A-Z]{1,2}\d{6,9}\b
    national_id: \b\d{8,16}\b
    date_of_birth: \b(?:19|20)\d{2}[-/]\d{2}[-/]\d{2}\b
  field_keywords:
    email:
    - email
    - direct_identifier
    phone:
    - phone
    - contact_identifier
    mobile:
    - phone
    - contact_identifier
    address:
    - address
    - location_identifier
    dob:
    - date_of_birth
    - direct_identifier
    birth:
    - date_of_birth
    - direct_identifier
    ssn:
    - ssn
    - government_identifier
    passport:
    - passport
    - government_identifier
    national_id:
    - national_id
    - government_identifier
    patient:
    - patient
    - health_attribute
    diagnosis:
    - diagnosis
    - health_attribute
    medical:
    - medical_record
    - health_attribute
    account:
    - account_id
    - account_identifier
    card:
    - credit_card
    - financial_identifier
    ip:
    - ipv4
    - network_identifier
    cookie:
    - session_token
    - session_identifier
    token:
    - access_token
    - session_identifier
    secret:
    - secret
    - credential
    password:
    - password
    - credential
  attribute_keywords:
    health:
    - diagnosis
    - patient
    - medical
    - prescription
    - treatment
    - allergy
    financial:
    - salary
    - income
    - credit
    - debt
    - card
    - iban
    - account
    government_id:
    - passport
    - ssn
    - national
    - tax_id
    - driver
    authentication:
    - password
    - token
    - secret
    - session
    - cookie
    - api_key
    contact:
    - email
    - phone
    - address
    - mobile
  entity_weights:
    email: 0.16
    phone: 0.14
    address: 0.14
    date_of_birth: 0.14
    ssn: 0.35
    passport: 0.32
    national_id: 0.32
    credit_card: 0.33
    patient: 0.28
    diagnosis: 0.3
    medical_record: 0.3
    account_id: 0.18
    ipv4: 0.08
    session_token: 0.3
    access_token: 0.34
    password: 0.38
    secret: 0.34

data_minimization:
  enabled: true
  strict_mode: true
  sanitize_freeform_context: true
  record_decisions_in_memory: true
  write_shared_contract: true
  record_lineage_events: true
  store_redaction_metadata: true
  block_on_required_field_loss: true
  enforce_allowlist_for_tool_calls: true
  enforce_allowlist_for_storage: true
  preserve_container_shape: true
  preserve_list_order: true
  default_policy_version: "v1"
  default_decision_stage: "minimization.runtime_gate"
  default_tool_stage: "minimization.pre_tool_call"
  default_storage_stage: "minimization.pre_storage"
  default_redaction_strategy: "mask"
  default_mask_token: "[REDACTED]"
  token_prefix: "tok_"
  hash_prefix: "sha256:"
  max_depth: 12
  max_collection_items: 500
  max_required_fields: 200
  max_allowed_fields: 500
  max_sensitive_field_patterns: 200
  max_always_drop_fields: 200
  always_drop_fields:
    - password
    - passwd
    - secret
    - api_key
    - access_token
    - refresh_token
    - authorization
    - cookie
    - session
    - cvv
    - ssn
  sensitive_field_patterns:
    - email
    - phone
    - address
    - dob
    - date_of_birth
    - passport
    - national_id
    - medical
    - diagnosis
    - patient
    - card
    - account
  strategy_overrides:
    email: mask
    phone: tokenize
    address: mask
    dob: mask
    diagnosis: drop
    patient: drop
    passport: drop
    national_id: drop
    account: hash

data_retention:
  enabled: true
  strict_mode: true
  sanitize_freeform_context: true
  record_decisions_in_memory: true
  write_shared_contract: true
  auto_update_due_status: true
  auto_schedule_due_deletion: true
  auto_update_deleted_status: true
  allow_legal_hold_override: false
  right_to_be_forgotten_requires_reason: true
  immediate_forget_request_deletion: true
  require_subject_id_for_obligation: false
  require_policy_id: true
  default_policy_version: "v1"
  default_decision_stage: "retention.runtime_gate"
  default_deletion_reason: "retention_expired"
  default_requested_by: "privacy_agent"
  default_deletion_workflow: "privacy_deletion_orchestrator"
  max_metadata_fields: 100
  max_record_tags: 100
  max_related_records: 100
  deletion_sla_seconds: 86400
  overdue_grace_seconds: 0

data_consent:
  enabled: true
  strict_mode: true
  sanitize_freeform_context: true
  record_decisions_in_memory: true
  record_stage_decisions: false
  write_shared_contract: true
  require_artifact_for_processing: true
  require_active_consent: true
  require_purpose_binding: true
  require_legal_basis_for_granted_consent: true
  enforce_source_context_match: true
  enforce_destination_context_allowlist: true
  enforce_action_allowlist: true
  allow_same_context_without_explicit_destination_binding: true
  default_policy_version: "v1"
  default_decision_stage: "consent.runtime_gate"
  max_allowed_contexts: 50
  max_allowed_processors: 50
  max_allowed_actions: 50
  max_allowed_purposes: 100

privacy_auditability:
  enabled: true
  strict_mode: true
  sanitize_freeform_context: true
  require_policy_metadata: true
  require_bundle_identifiers: true
  include_memory_evidence_by_default: true
  include_related_events_by_default: true
  include_config_metadata_in_reports: true
  emit_events_to_registered_sinks: true
  allow_state_export: true
  default_policy_version: "v1"
  default_bundle_name: "privacy_audit_bundle"
  max_audit_events: 500
  max_bundle_events: 200
  max_events_per_request: 150
  max_events_per_record: 150
  max_events_per_subject: 200
  max_policy_snapshots: 50

privacy_memory:
  enabled: true
  strict_mode: true
  sanitize_freeform_context: true
  require_audit_refs: true
  auto_create_tombstone_on_delete: true
  allow_state_export: true
  default_policy_version: "v1"
  default_deletion_workflow: "privacy_deletion_orchestrator"
  max_history_per_subject_purpose: 50
  max_history_per_record: 100
  max_decision_trace_length: 200
  max_redaction_history: 100
  max_lineage_parents: 20
  deletion_grace_period_seconds: 0