schema: slai.language.nlg_templates.v1
version: 1.0.0
locale: en
status: production_ready
metadata:
  name: English NLG Templates
  description: Canonical response templates for the language agent NLG engine. Large style resources such as discourse markers,
    politeness strategies, and verbose phrase pools belong in nlg_pack.yaml, not here.
  created: '2026-04-28'
  source_files:
  - nlg_templates_en.json
  maintainer_notes:
  - Use canonical intent IDs. Keep aliases here only for migration compatibility.
  - Templates should be short, safe, and deterministic enough for production fallback generation.
  - Use {slot|'fallback'} syntax for optional placeholders when supported by the NLG renderer.
  - Do not store discourse-marker pools or style rewrite rules in this file; keep those in nlg_pack.yaml.
  last_validated: '2026-04-28'
  response_count: 140
  template_count: 43
loader_contract:
  root_key: templates
  template_lookup_order:
  - exact_intent
  - alias_to_canonical
  - category_fallback
  - default
  response_selection: weighted_random_with_recent_repetition_guard
  placeholder_syntax:
    required: '{slot}'
    optional_with_fallback: '{slot|''fallback text''}'
    dotted_path: '{context.user_name|''there''}'
  compatibility:
    legacy_json_shape: intent -> {triggers, responses} or intent -> [responses]
    canonical_yaml_shape: templates -> intent -> template metadata and response variants
global_policy:
  default_intent: default
  default_locale: en-US
  safe_by_default: true
  allow_template_side_effects: false
  max_response_words: 160
  max_response_characters: 2000
  block_empty_render: true
  blocked_patterns:
  - as an AI language model
  - cannot answer
  - cannot respond
  - Error 404
  - server's taking a coffee break
  selection_weights:
    priority: 0.6
    style_match: 0.2
    slot_coverage: 0.15
    recent_repetition_penalty: 0.05
intent_aliases:
  greetings: greeting
  affirm: affirmation
  deny: denial
  request_help: help
  ask_capability: capability_request
  bot_challenge: identity_request
  get_time: time_request
  get_date: date_request
  ask_definition: definition_request
  stop_action: denial
  error: system_error
  cancellation_request: denial
  'yes': affirmation
  acknowledgement: acknowledgement
  nlp_error: nlp_error
  nlu_error: nlu_error
  nlg_error: nlg_error
  weather_inquiry: weather_inquiry
  time_request: time_request
category_fallbacks:
  error: system_error
  emotion: empathy
  feedback: negative_feedback
  task: default
  social: greeting
  dialogue_control: clarification_request
  language_feedback: default
global_placeholders:
  confidence_qualifier: ''
  sentiment_marker: ''
  modality_marker: ''
  act_type_marker: ''
  time: ''
  date: ''
templates:
  default:
    title: Default fallback
    category: fallback
    enabled: true
    canonical_intent: default
    aliases: []
    speech_act: directive
    modality: clarification
    triggers:
    - what
    - can you
    - do you
    - why
    - explain
    - how
    slots:
      required: []
      optional: []
      defaults: {}
    selection:
      strategy: weighted_random
      avoid_recent_repetition: true
      max_recent_template_reuse: 2
    safety:
      allow_humor: false
      allow_emojis: false
      allow_slang: false
      sensitive: false
    responses:
    - id: default.r001
      text: I’m not fully sure what you need yet. Could you rephrase or add a little more detail?
      style: neutral
      tone: professional
      enabled: true
      priority: 100
      speech_act: directive
    - id: default.r002
      text: I can help, but I need a bit more context. What would you like me to do?
      style: neutral
      tone: professional
      enabled: true
      priority: 95
      speech_act: directive
    - id: default.r003
      text: Could you clarify your request so I can respond accurately?
      style: neutral
      tone: professional
      enabled: true
      priority: 90
      speech_act: directive
    - id: default.r004
      text: I may be missing the intent behind that. Please give me one more detail to work with.
      style: neutral
      tone: professional
      enabled: true
      priority: 80
      speech_act: directive
    notes: Used only when NLU cannot produce a supported intent or all intent-specific templates fail.
  clarification_request:
    title: Clarification request
