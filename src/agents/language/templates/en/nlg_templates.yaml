validation:
  required_top_level_keys:
  - schema
  - version
  - locale
  - templates
  required_template_keys:
  - title
  - category
  - enabled
  - canonical_intent
  - responses
  required_response_keys:
  - id
  - text
  - enabled
  - priority
  placeholder_policy: missing required placeholders should skip the response variant and try the next eligible variant
  id_policy: response IDs must be stable across releases once consumed by logs or tests
test_vectors:
- intent: greeting
  entities: {}
  expected_any_contains:
  - Hello
  - Hi
  - Good
- intent: weather_inquiry
  entities:
    location: Paris
    weather_status: partly cloudy
    temperature: '21'
    unit: C
  expected_any_contains:
  - Paris
  - '21'
- intent: clarification_request
  entities:
    pending_intent: weather_inquiry
    mentioned_entities: 'location: Paris'
  expected_any_contains:
  - weather_inquiry
  - Paris
- intent: nlu_error
  entities: {}
  expected_any_contains:
  - understanding
  - intent
  - ambiguous
migration:
  target_path: src/agents/language/templates/en/nlg_templates.yaml
  language_config_update:
    nlg.templates_path: src/agents/language/templates/en/nlg_templates.yaml
  retire_after_migration:
  - src/agents/language/templates/nlg_templates_en.json
  retired_files:
  - nlg_templates_en.json
