metadata:
  name: finance_sentiment_pack
  domain: finance
  language: en
  version: 1.0.0
  schema_version: '1.0'
  created: '2026-04-28'
  status: production_ready_domain_overlay
  description: Finance/business sentiment overlay for domain-specific interpretation of financial and risk language.
  source_files:
  - loughran_mcdonald_lexicon.json
  intended_consumers:
  - NLUEngine
  - LanguageResourceManager
runtime_policy:
  enabled: true
  activation: explicit_config_or_domain_classifier
  merge_strategy: override_general_for_matching_terms
  case_sensitive: false
  unicode_normalization: NFKC
  record_domain_evidence: true
  neutral_default: 0.0
domain_detection:
  domain_id: finance
  minimum_activation_score: 0.45
  keywords:
  - profit
  - loss
  - risk
  - revenue
  - litigation
  - bankruptcy
  - dividend
  - volatility
  - downgrade
  - restatement
  - impairment
  - fraud
lexicons:
  finance:
    positive_count: 20
    negative_count: 20
    positive:
      advantage: 0.65
      dividend: 0.65
      efficient: 0.6
      exceed: 0.9
      gain: 0.7
      growth: 0.85
      improve: 0.75
      increase: 0.7
      optimistic: 0.75
      outperform: 0.9
      positive: 0.75
      profit: 0.8
      recovery: 0.75
      robust: 0.8
      stable: 0.7
      strengthen: 0.7
      strong: 0.7
      successful: 0.8
      surplus: 0.8
      upgrade: 0.85
    negative:
      adverse: -0.85
      bankruptcy: -1.0
      decline: -0.8
      decrease: -0.7
      default: -1.0
      delinquency: -0.8
      dispute: -0.7
      downgrade: -0.8
      failure: -0.9
      fraud: -1.0
      impairment: -0.85
      litigation: -0.95
      loss: -0.9
      negative: -0.75
      penalty: -0.9
      restatement: -0.95
      risk: -0.7
      uncertainty: -0.65
      volatility: -0.6
      write-off: -0.9
modifiers:
  intensifier_count: 9
  intensifiers:
    considerably: 1.2
    dramatically: 1.4
    exceptionally: 1.5
    extremely: 1.5
    highly: 1.4
    remarkably: 1.3
    significantly: 1.3
    substantially: 1.4
    very: 1.2
negation:
  negator_count: 9
  negators:
  - barely
  - cannot
  - hardly
  - neither
  - never
  - 'no'
  - none
  - not
  - without
  policy:
    flip_multiplier: -0.85
    scope_tokens: 4
validation:
  score_min: -1.0
  score_max: 1.0
  require_lowercase_keys: true
  reject_empty_terms: true
test_vectors:
- id: finance.sentiment.positive
  text: The company reported strong profit growth and a stable dividend.
  expected_label: positive
- id: finance.sentiment.negative
  text: The company faces litigation risk, volatility, and possible impairment.
  expected_label: negative
