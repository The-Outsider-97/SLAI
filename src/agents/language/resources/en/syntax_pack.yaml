chunking_policy:
  enabled: true
  source_tagset: penn_treebank
  converted_tagset: universal_dependencies
  max_pattern_length: 5
  overlap_resolution: longest_then_highest_confidence_then_priority
  emit_low_confidence_matches: true
  minimum_confidence: 0.5
  notes:
    - "Patterns are chunk/phrase patterns, not raw POS tagging rules."
    - Prefer Universal POS internally; Penn tags are retained for compatibility.
