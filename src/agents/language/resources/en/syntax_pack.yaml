# -----------------------------------------------------------------------------
# Language Syntax Pack (English)
# -----------------------------------------------------------------------------
# Consolidates POS aliases, Penn Treebank compatibility mappings, stopwords,
# lexical syntax classes, punctuation classes, and legacy chunk/phrase patterns.
# This pack replaces standalone pos_map.json, pos_patterns.json, and stopwords.json.
# -----------------------------------------------------------------------------

schema: language.syntax_pack.v1
version: "1.0.0"
locale: en
created: "2026-04-28"
description: "Production syntax resource pack for the language-agent subsystem. Consolidates POS aliases, Penn-to-Universal tag mapping, stopwords, lexical syntax classes, punctuation classes, and legacy chunk/phrase patterns."
sources:
  pos_map: pos_map.json
  stopwords: stopwords.json
  phrase_patterns: pos_patterns.json
load_policy:
  strict_schema: true
  deduplicate_lists: true
  normalize_case: true
  primary_tagset: universal_dependencies
  legacy_tagset_support:
    - penn_treebank
  unknown_pos_tag: X
  emit_diagnostics: true
  fail_on_invalid_regex: false
  preserve_legacy_patterns: true
tagsets:
  universal_dependencies:
    allowed_tags:
      - ADJ
      - ADP
      - ADV
      - AUX
      - CCONJ
      - DET
      - INTJ
      - NOUN
      - NUM
      - PART
      - PRON
      - PROPN
      - PUNCT
      - SCONJ
      - SYM
      - VERB
      - X
    description: "Primary POS tagset used by NLP, Rules, Grammar, and NLU modules."
  penn_treebank:
    description: Compatibility tagset for imported phrase/chunk patterns.
    to_universal:
      CC: CCONJ
      CD: NUM
      DT: DET
      EX: PRON
      FW: X
      IN: ADP
      JJ: ADJ
      JJR: ADJ
      JJS: ADJ
      LS: X
      MD: AUX
      NN: NOUN
      NNS: NOUN
      NNP: PROPN
      NNPS: PROPN
      PDT: DET
      POS: PART
      PRP: PRON
      PRP$: PRON
      RB: ADV
      RBR: ADV
      RBS: ADV
      RP: PART
      SYM: SYM
      TO: PART
      UH: INTJ
      VB: VERB
      VBD: VERB
      VBG: VERB
      VBN: VERB
      VBP: VERB
      VBZ: VERB
      WDT: DET
      WP: PRON
      WP$: PRON
      WRB: ADV
      ",": PUNCT
      ".": PUNCT
      ":": PUNCT
      "(": PUNCT
      ")": PUNCT
      "``": PUNCT
      "''": PUNCT
      "$": SYM
      "#": SYM
