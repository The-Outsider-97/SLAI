metadata:
  name: dialogue_pack
  language: en
  version: 1.0.0
  schema_version: '1.0'
  created: '2026-04-28'
  description: Dialogue-state resource pack for follow-up detection, context carryover, reference resolution, clarification
    handling, and conversation-window policies.
  sources:
  - path: resources/follow_up_patterns.json
    merged_into: follow_up_detection.patterns
  status: production_ready
runtime_policy:
  enabled: true
  locale: en-US
  case_sensitive: false
  normalize_unicode: true
  collapse_whitespace: true
  record_matches: true
  emit_diagnostics: true
  safe_default: no_follow_up
  minimum_follow_up_confidence: 0.62
  minimum_strong_follow_up_confidence: 0.82
  max_pattern_matches_per_utterance: 5
context_window_policy:
  default_history_window: 6
  max_history_window: 20
  entity_history_window: 12
  topic_history_window: 10
  summary_after_turns: 12
  max_summary_chars: 1800
  include_slots: true
  include_recent_entities: true
  include_unresolved_issues: true
  include_environment_state: true
  include_grammar_issues: false
  include_orthography_edits: false
  privacy:
    redact_sensitive_values: true
    redact_emails: true
    redact_phone_numbers: true
    redact_urls: false
follow_up_detection:
  enabled: true
  strategy: regex_plus_context_score
  score_weights:
    pattern_confidence: 0.45
    recency: 0.2
    topic_overlap: 0.15
    entity_overlap: 0.1
    slot_overlap: 0.05
    unresolved_issue_bonus: 0.05
  negative_cues:
  - id: follow_up.negative.new_topic
    pattern: \b(?:new topic|different question|unrelated|switching topics|forget that|never mind)\b
    confidence_penalty: 0.55
  - id: follow_up.negative.start_over
    pattern: \b(?:start over|from scratch|reset|ignore earlier|forget earlier)\b
    confidence_penalty: 0.75
  patterns:
  - id: follow_up.001
    enabled: true
    category: topic_return
    pattern: (?:going|getting)\s+back\s+to
    description: returns to a previous or original topic
    confidence: 0.86
    case_sensitive: false
    requires_prior_turn: true
    captures_reference: false
    priority: high
    action: retrieve_relevant_context
    metadata:
      source: follow_up_patterns.json
  - id: follow_up.002
    enabled: true
    category: explicit_follow_up
    pattern: (?:as\s+we\s+discussed|mentioned)\s+(?:earlier|before)
    description: explicitly states that the utterance is a follow-up
    confidence: 0.88
    case_sensitive: false
    requires_prior_turn: true
    captures_reference: false
    priority: high
    action: retrieve_relevant_context
    metadata:
      source: follow_up_patterns.json
  - id: follow_up.003
    enabled: true
    category: prior_context_reference
    pattern: regarding\s+(?:the\s+)?(?:previous|earlier)\s+(?:point|discussion)
    description: references a previous, earlier, or prior part of the dialogue
    confidence: 0.8
    case_sensitive: false
    requires_prior_turn: true
    captures_reference: false
    priority: medium
    action: retrieve_relevant_context
    metadata:
      source: follow_up_patterns.json
  - id: follow_up.004
    enabled: true
    category: explicit_follow_up
    pattern: following\s+up\s+on\s+(?:our\s+)?(?:previous|earlier)\s+
    description: explicitly states that the utterance is a follow-up
    confidence: 0.88
    case_sensitive: false
    requires_prior_turn: true
    captures_reference: false
    priority: high
    action: retrieve_relevant_context
    metadata:
      source: follow_up_patterns.json
  - id: follow_up.005
    enabled: true
    category: speaker_reference
    pattern: (?:about|regarding)\s+that\s+(?:thing|topic)\s+you\s+mentioned
    description: refers to something the assistant or user previously mentioned
    confidence: 0.82
    case_sensitive: false
    requires_prior_turn: true
    captures_reference: false
    priority: medium
    action: retrieve_relevant_context
    metadata:
      source: follow_up_patterns.json
  - id: follow_up.006
    enabled: true
