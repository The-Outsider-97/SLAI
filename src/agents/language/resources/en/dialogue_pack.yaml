reference_resolution:
  enabled: true
  resolution_order:
  - explicit_capture
  - pending_slot
  - recent_entity
  - active_topic
  - last_user_turn
  - last_agent_turn
  - conversation_summary
  ambiguous_reference_terms:
  - that
  - this
  - it
  - those
  - these
  - the previous one
  - the earlier one
  - that thing
  - that topic
  - that point
  - same thing
  - same topic
  max_candidates: 8
  minimum_candidate_score: 0.35
  score_weights:
    recency: 0.3
    entity_match: 0.25
    topic_match: 0.2
    slot_match: 0.15
    speaker_relevance: 0.1
  on_ambiguous_reference: ask_clarifying_question
  on_missing_antecedent: treat_as_new_turn_with_warning
topic_management:
  enabled: true
  active_topic_ttl_turns: 8
  topic_shift_threshold: 0.68
  topic_continue_threshold: 0.45
  topic_return_threshold: 0.52
  topic_shift_cues:
  - id: topic_shift.001
    pattern: \b(?:by the way|another question|different question|separate topic|on another note)\b
    confidence: 0.78
  - id: topic_shift.002
    pattern: \b(?:switching topics|change of subject|unrelated question)\b
    confidence: 0.92
  topic_return_cues:
  - id: topic_return.001
    pattern: \b(?:back to|returning to|circle back to|revisiting)\b
    confidence: 0.86
clarification_policy:
  enabled: true
  max_clarification_attempts: 3
  low_confidence_intent_threshold: 0.42
  low_confidence_entity_threshold: 0.5
  missing_required_slot_action: ask_for_slot
  ambiguous_reference_action: ask_targeted_clarification
  fallback_prompts:
    ambiguous_follow_up: Which earlier point do you want to continue from?
    missing_reference: What should I connect this to from our earlier conversation?
    missing_slot: Could you provide {slot_name}?
    low_confidence_intent: Could you rephrase that so I can understand your request better?
dialogue_memory_policy:
  enabled: true
  write_user_turns: true
  write_agent_turns: true
  write_detected_followups: true
  write_resolved_references: true
  record_salience: true
  default_turn_salience: 0.5
  follow_up_turn_salience_boost: 0.2
  unresolved_issue_salience_boost: 0.3
  max_memory_records_per_turn: 6
nlg_context_policy:
  enabled: true
  context_packet_fields:
  - active_topic
  - recent_turns
  - slots
  - entities
  - unresolved_issues
  - follow_up_state
  - environment_state
  max_recent_turns_for_nlg: 4
  max_entities_for_nlg: 12
  max_slots_for_nlg: 16
  include_follow_up_reason: true
diagnostics:
  issue_codes:
    ambiguous_follow_up: CTX.FOLLOWUP.AMBIGUOUS_REFERENCE
    missing_antecedent: CTX.FOLLOWUP.MISSING_ANTECEDENT
    topic_shift_detected: CTX.TOPIC.SHIFT_DETECTED
    context_window_truncated: CTX.CONTEXT.TRUNCATED
    missing_required_slot: CTX.SLOT.MISSING_REQUIRED
  severity_defaults:
    ambiguous_follow_up: warning
    missing_antecedent: warning
    topic_shift_detected: info
    context_window_truncated: info
    missing_required_slot: warning
test_vectors:
- input: To circle back to the tokenizer issue, can we simplify that?
  expected_follow_up: true
  expected_category: topic_return
- input: Following up on our previous discussion, what should we do next?
  expected_follow_up: true
  expected_category: explicit_follow_up
- input: By the way, what is the weather tomorrow?
  expected_follow_up: false
  expected_topic_shift: true
- input: 're: language cache config'
  expected_follow_up: true
  expected_capture: language cache config
- input: That thing you mentioned earlier sounds useful.
  expected_follow_up: true
  expected_action: resolve_reference_or_clarify
migration:
  retire_standalone_files:
  - follow_up_patterns.json
  language_config_updates:
    dialogue_context.dialogue_pack_path: src/agents/language/resources/en/dialogue_pack.yaml
    dialogue_context.follow_up_patterns_path: null
  loader_notes:
  - Load this pack once through the language resource manager or DialogueContext.
  - Compile follow_up_detection.patterns at startup and fail softly with diagnostics for invalid regex entries.
  - Use context_window_policy and nlg_context_policy instead of scattering window sizes through DialogueContext and NLGEngine.
