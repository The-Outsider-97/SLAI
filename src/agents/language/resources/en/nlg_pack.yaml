speech_act_realization:
  assertive:
    enabled: true
    default_strategy: plain_statement
    allowed_politeness:
    - hedging
    - boosters
    avoid_prefixes:
    - Please
    - I will
  directive:
    enabled: true
    default_strategy: clear_request
    allowed_politeness:
    - indirect_requests
    - apologies
    - hedging
    preferred_templates:
    - Could you
    - Please
    - Would you mind
    avoid_imperative_when_sentiment_negative: true
  commissive:
    enabled: true
    default_strategy: commitment_statement
    allowed_politeness:
    - hedging
    preferred_templates:
    - I can
    - I will
    - I can help with that
  expressive:
    enabled: true
    default_strategy: social_acknowledgement
    allowed_politeness:
    - apologies
    preferred_templates:
    - Thank you
    - You're welcome
    - I'm sorry
  declaration:
    enabled: true
    default_strategy: explicit_declaration
    allowed_politeness: []
    requires_high_confidence: true
response_quality:
  blocked_patterns:
  - id: nlg.block.001
    pattern: \bas an ai language model\b
    severity: warning
  - id: nlg.block.002
    pattern: \bI cannot answer\b
    severity: warning
  - id: nlg.block.003
    pattern: \bI do not have access\b
    severity: info
  overuse_controls:
    max_same_discourse_marker_per_session: 3
    max_same_verbose_prefix_per_session: 2
    reset_window_turns: 20
  postprocess:
    trim_whitespace: true
    collapse_repeated_spaces: true
    fix_space_before_punctuation: true
    ensure_terminal_punctuation: true
    preserve_markdown: true
integration:
  language_config_keys:
    nlg_pack_path: src/agents/language/resources/en/nlg_pack.yaml
    templates_path: src/agents/language/templates/en/nlg_templates.yaml
  nlg_templates_external:
    recommended_path: src/agents/language/templates/en/nlg_templates.yaml
    reason: Templates change more often than style resources and should remain separately editable.
  expected_nlg_engine_usage:
    load_pack_once: true
    cache_resource_pack: true
    select_by_style: true
    record_marker_usage: true
    surface_diagnostics_on_missing_pack: true
test_vectors:
- id: nlg.pack.test.001
  description: Low-confidence assertion should allow hedge and suppress booster.
  input:
    speech_act: assertive
    confidence: 0.55
    style: professional
  expected:
    allowed_strategies:
    - hedging
    blocked_strategies:
    - boosters
- id: nlg.pack.test.002
  description: Clarification request should prefer indirect request or polite directive.
  input:
    speech_act: directive
    intent: clarification_request
    confidence: 0.9
  expected:
    allowed_strategies:
    - indirect_requests
    - hedging
    max_politeness_markers: 1
- id: nlg.pack.test.003
  description: Technical verbose response can use technical prefix but only once.
  input:
    style: technical
    verbosity: 1.4
    word_count: 80
  expected:
    phrase_pool: technical
    max_verbose_prefixes: 1
- id: nlg.pack.test.004
  description: Short confirmation should suppress discourse markers and verbose prefixes.
  input:
    response: Got it.
    word_count: 2
  expected:
    allow_discourse_marker: false
    allow_verbose_prefix: false
migration_hints:
  move_to: src/agents/language/resources/en/nlg_pack.yaml
  retire_standalone_files:
  - discourse_markers.json
  - verbose_phrases.json
  - politeness_strategies.yaml
  keep_separate:
  - templates/en/nlg_templates.yaml
  language_config_update:
    nlg:
      nlg_pack_path: src/agents/language/resources/en/nlg_pack.yaml
      templates_path: src/agents/language/templates/en/nlg_templates.yaml
