# NLG Resource Pack (English)
# -----------------------------------------------------------------------------
# Consolidates discourse_markers.json, verbose_phrases.json, and
# politeness_strategies.yaml into a single NLG-facing style/resource pack.
# Keep response templates separate under templates/en/nlg_templates.yaml.
# -----------------------------------------------------------------------------

metadata:
  name: nlg_pack
  language: en
  locale_default: en-US
  version: 1.0.0
  status: production_ready_resource_pack
  created_at: '2026-04-28T09:40:00Z'
  description: Consolidated NLG resource pack for discourse markers, verbosity phrase pools, politeness strategies, style
    adaptation, and speech-act realization. Templates remain separate under templates/en/nlg_templates.yaml.
  source_files:
  - discourse_markers.json
  - verbose_phrases.json
  - politeness_strategies.yaml
  replaces_standalone_files:
  - discourse_markers.json
  - verbose_phrases.json
  - politeness_strategies.yaml
  intended_consumers:
  - NLGEngine
  - DialogueContext
  - LanguageResourceManager
schema:
  format: language_resource_pack
  pack_type: nlg
  schema_version: '1.0'
  templates_are_external: true
  requires:
    discourse_marker_fields:
    - id
    - marker
    - enabled
    - functions
    - preferred_position
    - formality
    - risk_level
    verbose_entry_fields:
    - id
    - text
    - enabled
    - style
    - position
    - risk_level
    politeness_entry_fields:
    - id
    - text
    - enabled
    - risk_level
    - max_uses_per_response
runtime_policy:
  preserve_template_text: true
  do_not_randomly_insert_markers: true
  allow_discourse_markers: true
  allow_verbose_prefixes: true
  allow_politeness_strategies: true
  max_discourse_markers_per_response: 2
  max_verbose_prefixes_per_response: 1
  max_politeness_markers_per_response: 1
  min_words_for_discourse_marker: 8
  min_words_for_verbose_prefix: 35
  suppress_markers_for_exact_answers: true
  suppress_markers_for_safety_refusals: true
  suppress_boosters_below_confidence: 0.82
  allow_hedges_below_confidence: 0.72
  selection_order:
  - template_rendering
  - speech_act_realization
  - politeness_strategy
  - discourse_marker
  - verbosity_prefix
  - style_adaptation
  - quality_validation
  dedupe_case_insensitive: true
  avoid_repeating_marker_within_turns: 3
  avoid_repeating_prefix_within_turns: 5
style_policy:
  default_style: neutral
  supported_styles:
    neutral:
      formality: 0.5
      verbosity: 1.0
      allow_slang: false
      default_phrase_pool: default
    friendly:
      formality: 0.35
      verbosity: 1.05
      allow_slang: true
      default_phrase_pool: friendly
    professional:
      formality: 0.78
      verbosity: 1.0
      allow_slang: false
      default_phrase_pool: professional
    technical:
      formality: 0.72
      verbosity: 1.15
      allow_slang: false
      default_phrase_pool: technical
    concise:
      formality: 0.55
      verbosity: 0.65
      allow_slang: false
      default_phrase_pool: null
  contraction_policy:
    formal_expand: true
    casual_contract: true
    never_contract:
    - cannot
    do_not_change_inside_code: true
  verbosity_policy:
    concise_max_words: 30
    normal_max_words: 120
    verbose_min_words: 35
    verbose_prefix_probability: 0.25
    never_prefix_if_response_starts_with:
    - 'Yes'
    - 'No'
    - OK
    - Okay
    - Sure
    - Sorry
discourse:
  selection_policy:
    marker_selection: function_then_style_then_recency
    prefer_explicit_relation_from_context: true
    fallback_function: general_transition
    punctuate_initial_marker: true
    do_not_insert_before_user_visible_code: true
    do_not_insert_inside_quoted_text: true
    avoid_low_information_markers:
    - actually
    - basically
    - you know
    - you see
    avoid_overconfident_markers_when_uncertain:
    - clearly
    - obviously
    - without a doubt
    - certainly
    - definitely
  functions:
    additive_elaboration:
      description: Adds related information or extends a point.
      preferred_position: sentence_initial_or_mid_sentence
      inventory_count: 17
    contrast_concession:
      description: Introduces contrast, exception, or concession.
      preferred_position: sentence_initial_or_clause_initial
      inventory_count: 28
    cause_result:
      description: Signals reason, consequence, or causal relation.
      preferred_position: sentence_initial_or_clause_initial
      inventory_count: 18
    temporal_sequence:
      description: Orders events or shifts temporal reference.
      preferred_position: sentence_initial_or_clause_initial
      inventory_count: 48
    condition:
      description: Introduces condition, contingency, or assumption.
      preferred_position: clause_initial
      inventory_count: 23
    comparison_analogy:
      description: Compares, analogizes, or aligns two ideas.
      preferred_position: sentence_initial
      inventory_count: 13
    example_evidence:
      description: Introduces an example, illustration, or specific evidence.
      preferred_position: sentence_initial
      inventory_count: 10
    summary_conclusion:
      description: Summarizes, closes, or compresses prior content.
      preferred_position: sentence_initial
      inventory_count: 20
    emphasis_certainty:
      description: Emphasizes certainty, clarity, or importance.
      preferred_position: sentence_initial_or_inline
      inventory_count: 20
    stance_evaluation:
      description: Signals speaker stance, evaluation, or attitude.
      preferred_position: sentence_initial_or_inline
      inventory_count: 20
    topic_management:
      description: Changes, resumes, narrows, or references a topic.
      preferred_position: sentence_initial
      inventory_count: 24
    ordering_structure:
      description: Structures multi-part responses.
      preferred_position: sentence_initial
      inventory_count: 14
    discourse_response:
      description: Short conversational response marker.
      preferred_position: standalone_or_sentence_initial
      inventory_count: 4
    question_relative:
      description: Relative/interrogative connective used in clauses.
      preferred_position: clause_initial
      inventory_count: 19
    general_transition:
      description: General-purpose connective with weak functional specificity.
      preferred_position: flexible
      inventory_count: 136
