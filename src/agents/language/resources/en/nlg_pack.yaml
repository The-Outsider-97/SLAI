verbosity:
  selection_policy:
    prefix_selection: style_then_intent_then_recency
    apply_only_when_expanding: true
    max_prefixes_per_response: 1
    strip_duplicate_terminal_punctuation: true
    avoid_prefix_for_short_confirmations: true
  phrase_pools:
    default:
      enabled: true
      description: Default verbosity prefix pool.
      entries:
      - id: verbose.default.001
        text: Let me elaborate on that a bit.
        enabled: true
        style: default
        position: prefix
        requires_min_words: 35
        risk_level: low
        max_uses_per_response: 1
      - id: verbose.default.002
        text: 'Here''s some additional context:'
        enabled: true
        style: default
        position: prefix
        requires_min_words: 35
        risk_level: low
        max_uses_per_response: 1
      - id: verbose.default.003
        text: To provide more complete information,
        enabled: true
        style: default
        position: prefix
        requires_min_words: 35
        risk_level: low
        max_uses_per_response: 1
      - id: verbose.default.004
        text: Expanding on that thought,
        enabled: true
        style: default
        position: prefix
        requires_min_words: 35
        risk_level: low
        max_uses_per_response: 1
      - id: verbose.default.005
        text: For better understanding,
