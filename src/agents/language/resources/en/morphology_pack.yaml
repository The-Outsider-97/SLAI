metadata:
  name: morphology_pack
  locale: en
  language: English
  version: 1.0.0
  schema_version: '1.0'
  created: '2026-04-28'
  description: Production morphology resource pack for the language subsystem. Consolidates regular morphology rules, derivational
    morphology, irregular nouns, and irregular verbs into one validated resource.
  source_files:
  - morphology_rules.json
  - irregular_nouns.json
  - irregular_verbs.json
  intended_consumers:
  - Rules
  - NLPEngine
  - GrammarProcessor
  - NLUEngine
  - NLGEngine
  notes:
  - Slash-separated alternatives from legacy resources are normalized into lists.
  - Regular rules are deterministic fallbacks; irregular inventories take priority.
  - The pack is a resource asset. Runtime toggles and file paths belong in language_config.yaml.
runtime_policy:
  default_locale: en
  casefold_lookup: true
  unicode_normalization: NFKC
  prefer_irregular_forms: true
  allow_regular_fallback: true
  allow_multiple_outputs: true
  return_ranked_forms: true
  max_generated_forms_per_lemma: 12
  unknown_word_policy: regular_fallback
  blocked_regularization_policy: keep_original_with_issue
  confidence:
    irregular_exact: 0.98
    regular_rule: 0.86
    heuristic_lemmatization: 0.72
    derivational_rule: 0.82
    unknown_fallback: 0.55
feature_schema:
  upos:
  - NOUN
  - PROPN
  - PRON
  - VERB
  - AUX
  - ADJ
  - ADV
  - DET
  - NUM
  - ADP
  - PART
  - SCONJ
  - CCONJ
  - PUNCT
  - X
  number:
  - singular
  - plural
  - mass
  - invariant
  - unknown
  person:
  - 1
  - 2
  - 3
  tense:
  - present
  - past
  - future
  - unknown
  aspect:
  - simple
  - progressive
  - perfect
  - perfect_progressive
  - unknown
  verb_form:
  - finite
  - infinitive
  - gerund
  - present_participle
  - past_participle
  - base
  - unknown
  degree:
  - positive
  - comparative
  - superlative
  case:
  - subject
  - object
  - possessive
  - unknown
  voice:
  - active
  - passive
  - unknown
precedence:
- protected_or_uninflectable_terms
- irregular_nouns
- irregular_verbs
- regular_inflection_rules
- derivational_rules
- heuristic_lemmatization
protected_or_uninflectable_terms:
  enabled: true
  classes:
    mass_nouns:
    - advice
    - equipment
    - furniture
    - information
    - knowledge
    - luggage
    - news
    - software
    - traffic
    invariant_common_nouns:
    - aircraft
    - barracks
    - bison
    - chassis
