regular_inflection_rules:
  nouns:
    plural:
      rules:
      - id: morph.noun.plural.001.add_s_suffix
        enabled: true
        family: noun
        category: plural
        description: Add '-s' suffix
        priority: 10
        confidence: 0.86
        operation: append_suffix
        pattern: default
        suffix: s
        examples:
        - source: cat
          target: cats
        - source: dog
          target: dogs
      - id: morph.noun.plural.002.add_es_for_words_ending_in_s_sh_ch_x_z
        enabled: true
        family: noun
        category: plural
        description: Add '-es' for words ending in [s, sh, ch, x, z]
        priority: 20
        confidence: 0.86
        operation: append_suffix
        pattern: (?:s|sh|ch|x|z)$
        suffix: es
        examples:
        - source: bus
          target: buses
        - source: fox
          target: foxes
      - id: morph.noun.plural.003.replace_y_with_ies_for_consonant_y
        enabled: true
        family: noun
        category: plural
        description: Replace '-y' with '-ies' for consonant + y
        priority: 30
        confidence: 0.86
        operation: replace_suffix
        pattern: '[^aeiou]y$'
        replacement: ies
        examples:
        - source: city
          target: cities
        - source: baby
          target: babies
      - id: morph.noun.plural.004.add_s_for_vowel_y
        enabled: true
        family: noun
        category: plural
        description: Add '-s' for vowel + y
        priority: 40
        confidence: 0.86
        operation: append_suffix
        pattern: '[aeiou]y$'
        suffix: s
        examples:
        - source: boy
          target: boys
        - source: day
          target: days
      - id: morph.noun.plural.005.replace_f_fe_with_ves
        enabled: true
        family: noun
        category: plural
        description: Replace '-f/-fe' with '-ves'
        priority: 50
        confidence: 0.86
        operation: replace_suffix
        pattern: (?:f|fe)$
        replacement: ves
        suffix: ves
        examples:
        - source: wolf
          target: wolves
        - source: wife
          target: wives
    possessive:
      rules:
      - id: morph.noun.possessive.001.add_s_to_singular_nouns
        enabled: true
        family: noun
        category: possessive
        description: Add "'s" to singular nouns
        priority: 10
        confidence: 0.86
        operation: append_suffix
        suffix: '''s'
        examples:
        - source: dog
          target: dog's
        - source: Chris
          target: Chris's
      - id: morph.noun.possessive.002.add_apostrophe_only_to_plural_nouns_ending
        enabled: true
        family: noun
        category: possessive
        description: Add apostrophe only to plural nouns ending in -s
        priority: 20
        confidence: 0.86
        operation: append_suffix
        examples:
        - source: dogs
          target: dogs'
        - source: players
          target: players'
  verbs:
    third_person_singular:
      rules:
      - id: morph.verb.third_person_singular.001.add_s
        enabled: true
        family: verb
        category: third_person_singular
        description: Add '-s'
        priority: 10
        confidence: 0.86
        operation: append_suffix
        pattern: default
        suffix: s
        examples:
        - source: run
          target: runs
        - source: eat
          target: eats
      - id: morph.verb.third_person_singular.002.add_es_for_s_sh_ch_x_z_o_endings
        enabled: true
        family: verb
        category: third_person_singular
        description: Add '-es' for [s, sh, ch, x, z, o] endings
        priority: 20
        confidence: 0.86
        operation: append_suffix
        pattern: (?:s|sh|ch|x|z|o)$
        suffix: es
        examples:
        - source: pass
          target: passes
        - source: go
          target: goes
      - id: morph.verb.third_person_singular.003.replace_y_with_ies_for_consonant_y
        enabled: true
        family: verb
        category: third_person_singular
        description: Replace '-y' with '-ies' for consonant + y
        priority: 30
        confidence: 0.86
        operation: replace_suffix
        pattern: '[^aeiou]y$'
        replacement: ies
        examples:
        - source: study
          target: studies
        - source: fly
          target: flies
    past_tense:
      rules:
      - id: morph.verb.past_tense.001.add_ed
        enabled: true
        family: verb
        category: past_tense
        description: Add '-ed'
        priority: 10
        confidence: 0.86
        operation: append_suffix
        pattern: default
        suffix: ed
        examples:
        - source: walk
          target: walked
        - source: play
          target: played
      - id: morph.verb.past_tense.002.add_d_for_silent_e
        enabled: true
        family: verb
        category: past_tense
        description: Add '-d' for silent -e
        priority: 20
        confidence: 0.86
        operation: append_suffix
        pattern: e$
        suffix: d
        examples:
        - source: dance
          target: danced
        - source: smile
          target: smiled
      - id: morph.verb.past_tense.003.double_consonant_ed_for_cvc_pattern
        enabled: true
        family: verb
        category: past_tense
        description: Double consonant + '-ed' for CVC pattern
        priority: 30
        confidence: 0.86
        operation: double_final_consonant_then_append
        pattern: '[^aeiou][aeiou][^aeiou]$'
        suffix: ed
        examples:
        - source: stop
          target: stopped
        - source: plan
          target: planned
    present_participle:
      rules:
      - id: morph.verb.present_participle.001.add_ing
        enabled: true
        family: verb
        category: present_participle
        description: Add '-ing'
        priority: 10
        confidence: 0.86
        operation: append_suffix
        pattern: default
        suffix: ing
        examples:
        - source: work
          target: working
        - source: play
          target: playing
      - id: morph.verb.present_participle.002.remove_e_ing
        enabled: true
        family: verb
        category: present_participle
        description: Remove '-e' + '-ing'
        priority: 20
        confidence: 0.86
        operation: remove_suffix_then_append
        pattern: e$
        suffix: ing
        examples:
        - source: make
          target: making
        - source: write
          target: writing
      - id: morph.verb.present_participle.003.double_consonant_ing_for_cvc_pattern
        enabled: true
        family: verb
        category: present_participle
        description: Double consonant + '-ing' for CVC pattern
        priority: 30
        confidence: 0.86
        operation: double_final_consonant_then_append
        pattern: '[^aeiou][aeiou][^aeiou]$'
        suffix: ing
        examples:
        - source: run
          target: running
        - source: swim
          target: swimming
  adjectives:
    comparative:
      rules:
      - id: morph.adjective.comparative.001.add_er
        enabled: true
        family: adjective
        category: comparative
        description: Add '-er'
        priority: 10
        confidence: 0.86
        operation: append_suffix
        pattern: default
        suffix: er
        examples:
        - source: fast
          target: faster
        - source: small
          target: smaller
      - id: morph.adjective.comparative.002.replace_y_with_ier
        enabled: true
        family: adjective
        category: comparative
        description: Replace '-y' with '-ier'
        priority: 20
        confidence: 0.86
        operation: replace_suffix
        pattern: y$
        examples:
        - source: happy
          target: happier
        - source: heavy
          target: heavier
      - id: morph.adjective.comparative.003.use_more_for_multi_syllable_adjectives
        enabled: true
        family: adjective
        category: comparative
        description: Use 'more' for multi-syllable adjectives
        priority: 30
        confidence: 0.86
        operation: analytic_more
        pattern: syllables >= 2
        examples:
        - source: beautiful
          target: more beautiful
    superlative:
      rules:
      - id: morph.adjective.superlative.001.add_est
        enabled: true
        family: adjective
        category: superlative
        description: Add '-est'
        priority: 10
        confidence: 0.86
        operation: append_suffix
        suffix: est
        examples:
        - source: fast
          target: fastest
        - source: small
          target: smallest
      - id: morph.adjective.superlative.002.replace_y_with_iest
        enabled: true
        family: adjective
        category: superlative
        description: Replace '-y' with '-iest'
        priority: 20
        confidence: 0.86
        operation: replace_suffix
        examples:
        - source: happy
          target: happiest
        - source: heavy
          target: heaviest
      - id: morph.adjective.superlative.003.use_most_for_multi_syllable_adjectives
        enabled: true
        family: adjective
        category: superlative
        description: Use 'most' for multi-syllable adjectives
        priority: 30
        confidence: 0.86
        operation: analytic_most
        examples:
        - source: beautiful
          target: most beautiful
