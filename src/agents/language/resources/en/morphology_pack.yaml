derivational_morphology:
  prefixes:
  - id: morph.deriv.prefix.001.un
    enabled: true
    affix: un-
    position: prefix
    function: negation
    confidence: 0.82
    examples:
    - source: happy
      target: unhappy
    - source: do
      target: undo
  - id: morph.deriv.prefix.002.re
    enabled: true
    affix: re-
    position: prefix
    function: repetition
    confidence: 0.82
    examples:
    - source: do
      target: redo
    - source: write
      target: rewrite
  - id: morph.deriv.prefix.003.dis
    enabled: true
    affix: dis-
    position: prefix
    function: negation
    confidence: 0.82
    examples:
    - source: agree
      target: disagree
    - source: honest
      target: dishonest
  suffixes:
  - id: morph.deriv.suffix.001.able
    enabled: true
    affix: -able
    position: suffix
    function: adjective formation
    confidence: 0.82
    examples:
    - source: read
      target: readable
    - source: love
      target: lovable
  - id: morph.deriv.suffix.002.ly
    enabled: true
    affix: -ly
    position: suffix
    function: adverb formation
    confidence: 0.82
    examples:
    - source: quick
      target: quickly
    - source: happy
      target: happily
  - id: morph.deriv.suffix.003.ness
    enabled: true
    affix: -ness
    position: suffix
    function: noun formation
    confidence: 0.82
    examples:
    - source: happy
      target: happiness
    - source: kind
      target: kindness
  policy:
    apply_before_inflection: false
    generate_candidates_only: true
    validate_against_wordlist_when_available: true
lemmatization:
  noun_singularization:
    enabled: true
    priority:
    - irregular_reverse_lookup
    - invariant_noun_lookup
    - ies_to_y
    - ves_to_f_or_fe
    - es_suffix_removal
    - s_suffix_removal
    rules:
    - id: lemma.noun.ies_to_y
      pattern: ies$
      replacement: y
      confidence: 0.82
      examples:
      - source: cities
        target: city
    - id: lemma.noun.ves_to_f
      pattern: ves$
      replacement: f
      confidence: 0.7
      examples:
      - source: wolves
        target: wolf
    - id: lemma.noun.es_removal
      pattern: (?:s|sh|ch|x|z)es$
      operation: remove_es
      confidence: 0.76
      examples:
      - source: boxes
        target: box
    - id: lemma.noun.s_removal
      pattern: s$
      operation: remove_s
      blocked_endings:
      - ss
      - us
      - is
      confidence: 0.68
      examples:
      - source: dogs
        target: dog
  verb_lemmatization:
    enabled: true
    priority:
    - irregular_form_to_lemma
    - present_participle_rules
    - past_tense_rules
    - third_person_singular_rules
    - base_form_fallback
    rules:
    - id: lemma.verb.ing_drop_double_consonant
      pattern: ([bcdfghjklmnpqrstvwxyz])\1ing$
      operation: drop_ing_and_one_consonant
      confidence: 0.78
      examples:
      - source: running
        target: run
    - id: lemma.verb.ing_restore_e
      pattern: ing$
      operation: drop_ing_or_restore_silent_e
      confidence: 0.7
      examples:
      - source: making
        target: make
    - id: lemma.verb.ed_drop_double_consonant
      pattern: ([bcdfghjklmnpqrstvwxyz])\1ed$
      operation: drop_ed_and_one_consonant
      confidence: 0.76
      examples:
      - source: stopped
        target: stop
    - id: lemma.verb.ed_restore_e
      pattern: ed$
      operation: drop_ed_or_restore_silent_e
      confidence: 0.68
      examples:
      - source: liked
        target: like
    - id: lemma.verb.ies_to_y
      pattern: ies$
      replacement: y
      confidence: 0.82
      examples:
      - source: studies
        target: study
    - id: lemma.verb.es_or_s_removal
      pattern: (?:es|s)$
      operation: remove_present_suffix
      confidence: 0.7
      examples:
      - source: goes
        target: go
  adjective_lemmatization:
    enabled: true
    rules:
    - id: lemma.adj.irregular_comparative
      source: inline_irregulars
      confidence: 0.95
    - id: lemma.adj.ier_to_y
      pattern: ier$
      replacement: y
      confidence: 0.8
      examples:
      - source: happier
        target: happy
    - id: lemma.adj.iest_to_y
      pattern: iest$
      replacement: y
      confidence: 0.8
      examples:
      - source: happiest
        target: happy
    - id: lemma.adj.er_est_removal
      pattern: (?:er|est)$
      operation: remove_degree_suffix
      confidence: 0.64
      examples:
      - source: faster
        target: fast
