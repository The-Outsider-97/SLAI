speech_acts:
  types:
    assertive:
      description: Speaker provides, confirms, denies, or states information.
      default_intents:
      - affirmation
      - denial
    directive:
      description: User requests, asks, commands, or instructs the agent to do something.
      default_intents:
      - weather_inquiry
      - play_music
      - set_timer
      - time_request
      - date_request
      - definition_request
      - restaurant_search
      - capability_request
      - help_request
      - stop_action
    expressive:
      description: Speaker expresses social state, gratitude, greeting, farewell, apology, or affect.
      default_intents:
      - greeting
      - farewell
      - gratitude
    commissive:
      description: Speaker commits to a future action.
      default_intents: []
    declaration:
      description: Speaker performs an action by declaring it.
      default_intents: []
    interrogative:
      description: Speaker asks about identity, capability, or system state.
      default_intents:
      - bot_challenge
  intent_to_speech_act:
    greeting: expressive
    farewell: expressive
    affirmation: assertive
    denial: assertive
    gratitude: expressive
    weather_inquiry: directive
    play_music: directive
    set_timer: directive
    time_request: directive
    date_request: directive
    definition_request: directive
    restaurant_search: directive
    bot_challenge: interrogative
    capability_request: directive
    stop_action: directive
    help_request: directive
  modality_to_speech_act_hints:
    imperative: directive
    interrogative: directive
    deontic: directive
    epistemic: assertive
    conditional: assertive
    dynamic: assertive
    alethic: assertive
entity_validation:
  validators:
    temporal:
      description: Accepts relative dates, clock times, ISO-like dates, and common calendar expressions.
      normalizers:
      - lowercase
      - trim
      - collapse_whitespace
    duration:
      description: Accepts numeric/time-unit duration phrases and relative duration phrases.
      normalizers:
      - lowercase
      - trim
      - collapse_whitespace
    quantity:
      description: Accepts numbers, decimals, and simple number words.
      normalizers:
      - lowercase
      - trim
    location:
      description: Accepts known locations and capitalized location-like spans; high precision should use domain/geocoder
        validation later.
      normalizers:
      - trim
      - collapse_whitespace
    closed_set:
      description: Accepts only values covered by the regex/lexicon.
      normalizers:
      - lowercase
      - trim
    term:
      description: Free-text term validation; only trusted inside an intent slot context.
      normalizers:
      - trim
      - collapse_whitespace
    free_text:
      description: Broad free-text capture. Must be bounded by intent context and max span length.
      normalizers:
      - trim
      - collapse_whitespace
    person_or_artist:
      description: Broad person/artist name capture. Should later be backed by NER or domain lookup.
      normalizers:
      - trim
      - collapse_whitespace
slot_policy:
  slot_aliases:
    location: LOCATION
    date_time: DATE_TIME
    datetime: DATE_TIME
    time: TIME
    duration: DURATION
    number: NUMBER
    time_unit: TIME_UNIT
    song: SONG_NAME
    song_name: SONG_NAME
    artist: ARTIST_NAME
    artist_name: ARTIST_NAME
    album: ALBUM_NAME
    album_name: ALBUM_NAME
    genre: GENRE
    term: TERM
    cuisine: CUISINE_TYPE
    cuisine_type: CUISINE_TYPE
    food: FOOD_TYPE
    food_type: FOOD_TYPE
  clarification_prompts:
    LOCATION: Which location should I use?
    DATE_TIME: What date or time should I use?
    DURATION: How long should the timer be?
    TERM: What term would you like me to define?
    SONG_NAME: Which song would you like?
    ARTIST_NAME: Which artist should I use?
modality_policy:
  default_modality: epistemic
  question_punctuation_overrides_to: interrogative
  imperative_verb_start_overrides_to: imperative
  conditional_marker_overrides_to: conditional
  allow_multiple_modalities: true
  max_modalities: 3
  confidence_decay_per_additional_marker: 0.08
test_vectors:
- text: hello
  expected_intent: greeting
  expected_entities: {}
  expected_modality: epistemic
- text: what's the weather in Paris tomorrow
  expected_intent: weather_inquiry
  expected_entities:
    LOCATION: Paris
    DATE_TIME: tomorrow
  expected_modality: interrogative
- text: set a timer for 10 minutes
  expected_intent: set_timer
  expected_entities:
    DURATION: 10 minutes
  expected_modality: imperative
- text: define entropy
  expected_intent: definition_request
  expected_entities:
    TERM: entropy
  expected_modality: imperative
- text: can you help me
  expected_intent: help_request
  expected_entities: {}
  expected_modality: dynamic
migration_hints:
  replace_config_paths:
    custom_intent_patterns_path: semantics_pack_path
    custom_entity_patterns_path: semantics_pack_path
    modality_markers_path: semantics_pack_path
  recommended_language_config:
    nlu:
      semantics_pack_path: src/agents/language/resources/en/semantics_pack.yaml
      use_semantics_pack: true
      intent_alias_normalization: true
      accept_precomputed_nlp: true
      use_shared_nlp_engine: true
    nlg:
      semantics_pack_path: src/agents/language/resources/en/semantics_pack.yaml
      normalize_intent_aliases: true
    dialogue_context:
      semantics_pack_path: src/agents/language/resources/en/semantics_pack.yaml
  retire_standalone_files:
  - intent_patterns.json
  - entity_patterns.json
  - modality_markers.json
