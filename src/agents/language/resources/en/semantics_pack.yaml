entity_types:
  LOCATION:
    enabled: true
    description: Geographic location, city, region, address-like phrase, or deictic location such as 'near me'.
    canonical_type: LOCATION
    aliases: []
    extraction:
      type: regex
      pattern: (Paris|London|New York|Tokyo|Berlin|Rome|California|Germany|Main Street|[A-Z][a-zA-Z\s]+(?:, [A-Z]{2})?|near
        me)
      flags:
      - IGNORECASE
      - UNICODE
      capture_group: 1
      priority: 70
      allow_overlaps: false
      requires_intent_context: true
      max_span_chars: 120
    validation:
      validator: location
      required: false
      min_confidence: 0.45
      normalize: true
      drop_if_empty: true
    components: {}
    risk: medium
    metadata: {}
  DATE_TIME:
    enabled: true
    description: Date or broad temporal expression.
    canonical_type: DATE_TIME
    aliases: []
    extraction:
      type: regex
      pattern: (today|tomorrow|yesterday|next week|last month|this evening|tonight|now|\d{1,2}/\d{1,2}/(?:\d{4}|\d{2})|\d{4}-\d{2}-\d{2}|(?:Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\s+\d{1,2}(?:st|nd|rd|th)?(?:,?\s+\d{4})?|at
