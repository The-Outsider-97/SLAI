metadata:
  pack_name: semantics_pack
  schema_version: 1.0.0
  language: en
  locale: en
  created: '2026-04-28'
  owner: src.agents.language
  description: Unified semantics resource pack for NLU intent detection, entity extraction, modality detection, speech-act
    mapping, and cross-module semantic aliases.
  source_files:
  - intent_patterns.json
  - entity_patterns.json
  - modality_markers.json
  migration_status: canonical_resource_pack
runtime_policy:
  default_intent: unknown
  fallback_intent: default
  unknown_intent: unknown
  low_confidence_intent: clarification_request
  intent_match_order:
  - exact_phrase
  - template
  - regex
  - keyword_overlap
  - semantic_similarity
  case_sensitive: false
  unicode_normalization: NFKC
  collapse_whitespace: true
  allow_partial_intent_match: true
  minimum_intent_confidence: 0.35
  ambiguity_margin: 0.08
  max_intent_candidates: 5
  max_entity_matches_per_type: 10
  prefer_longest_entity_match: true
  dedupe_entity_spans: true
  require_context_for_broad_entities: true
  entity_overlap_strategy: priority_then_longest_then_confidence
  record_alternatives: true
intent_aliases:
  affirm: affirmation
  ask_capability: capability_request
  ask_definition: definition_request
  deny: denial
  find_restaurant: restaurant_search
  get_date: date_request
  get_time: time_request
  greetings: greeting
  request_help: help_request
