# Orthography Resource Pack (English)
# -----------------------------------------------------------------------------
# Consolidates normalization.yaml and typo_patterns.json into a single resource
# pack for OrthographyProcessor, SpellChecker, and a future LanguageResourceManager.
# Keep this file as data: paths/toggles remain in language_config.yaml; large
# orthographic resources live here.
# -----------------------------------------------------------------------------

metadata:
  name: orthography_pack
  language: en
  locale_default: en-US
  version: 1.0.0
  status: production_ready_resource_pack
  created_at: '2026-04-28T09:16:33Z'
  description: Consolidated orthography resources for normalization, contraction handling, locale-aware spelling variants,
    typo candidate generation, and safe early-stage text cleanup.
  source_files:
  - normalization.yaml
  - typo_patterns.json
  replaces_standalone_files:
  - normalization.yaml
  - typo_patterns.json
  intended_consumers:
  - OrthographyProcessor
  - SpellChecker
  - LanguageResourceManager
schema:
  format: language_resource_pack
  pack_type: orthography
  schema_version: '1.0'
  requires:
    normalization_rule_fields:
    - id
    - category
    - source
    - target
    - enabled
    - risk_level
    - autocorrect_allowed
    - confidence
    typo_pattern_fields:
    - id
    - category
    - pattern
    - replacement
    - enabled
    - risk_level
    - candidate_only
runtime_policy:
  preserve_source_spans: true
  preserve_case: true
  preserve_whitespace: true
  normalize_unicode: true
  unicode_form: NFKC
  normalize_quote_chars: true
  normalize_dash_chars: true
  collapse_whitespace: false
  remove_control_chars: true
  normalize_spacing_around_punctuation: true
  default_autocorrect_threshold: 0.86
  low_confidence_threshold: 0.62
  max_context_window: 3
  max_input_chars: 200000
  max_token_length: 96
  application_order:
  - protect_terms
  - unicode_normalization
  - quote_dash_normalization
  - control_character_removal
  - exact_normalization_rules
  - contraction_expansion
  - locale_spelling_variants
  - spell_checker_candidate_generation
  - typo_candidate_generation
  - compound_handling
  - punctuation_spacing
  - restore_case_and_spans
tokenization:
  token_pattern: '[A-Za-z]+(?:[''’][A-Za-z]+)*(?:-[A-Za-z]+)*|\d+(?:[.,:/-]\d+)*|\S'
  word_like_pattern: ^[A-Za-z]+(?:['’][A-Za-z]+)*(?:-[A-Za-z]+)*$
  ignore_patterns:
  - ^https?://
  - ^www\.
  - ^[\w.+-]+@[\w.-]+\.[A-Za-z]{2,}$
  - ^[_\W]+$
  - ^\d+(?:[.,:/-]\d+)*$
  - ^\[[A-Z_]+\]$
  protected_terms:
  - SLAI
  - GAIA
  - NLU
  - NLG
  - NLP
  - API
  - JSON
  - YAML
  - BPE
normalization:
  enabled: true
  notes:
  - Rules are grouped by category so the processor can apply different confidence and safety policies.
  - standard_to_informal_variant rules are retained for generation/style awareness but disabled for input normalization by
    default.
  - Locale spelling variants should be applied only when enable_locale_normalization is true and a target locale is configured.
  category_policy:
    common_misspelling:
      enabled: true
      autocorrect_allowed: true
      requires_word_boundary: true
    contraction_expansion:
      enabled: true
      autocorrect_allowed: true
      requires_word_boundary: true
    abbreviation_expansion:
      enabled: true
      autocorrect_allowed: true
      requires_word_boundary: true
    symbol_expansion:
      enabled: true
      autocorrect_allowed: true
      requires_word_boundary: false
    informal_to_standard:
      enabled: true
      autocorrect_allowed: true
      requires_word_boundary: true
    standard_to_informal_variant:
      enabled: false
      autocorrect_allowed: false
      use_case: NLG style control only
    locale_spelling_variant:
      enabled: true
      autocorrect_allowed: false
      requires_locale: true
    spacing_or_compound_normalization:
      enabled: true
      autocorrect_allowed: false
      requires_phrase_boundary: true
    archaic_modernization:
      enabled: true
      autocorrect_allowed: false
      requires_context_confirmation: true
