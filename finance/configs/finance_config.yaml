initial_capital: 100
position_size: 0.1  # 10% of portfolio per trade
stop_loss: 0.1    # 10% stop loss
take_profit: 0.15   # 15% take profit


adaptive_learning_system:
  n_models: 3
  market_features: 5
  learning_rate: 0.01
  drift_threshold: 2.5
  diversity_strength: 0.1
  lr_decay: 0.9995
  momentum: 0.9
  regularization: 0.0001

backtester:
  train_window: 180  # Days for training
  test_window: 30    # Days for testing
  initial_capital: 100
  buffer_size: 500   # Max data points to keep
  strategy: prediction_based  # Options: prediction_based, momentum, mean_reversion
  transaction_cost: 0.001  # 0.1% per trade
  prediction_threshold: 0.02  # Min predicted change to trigger trade
  momentum_lookback: 14       # Days for momentum calculation
  mean_reversion_lookback: 20 # Days for mean reversion
  z_threshold: 1.5            # Z-score threshold for mean reversion
  hyperparameter_tuning: true
  tuning_strategy: bayesian  # 'grid' or 'bayesian'
  tuning_config:
    n_calls: 30               # Bayesian iterations
    n_random_starts: 10       # Initial random points
  model:
    type: 'GradientBoosting'  # Options: GradientBoosting, RandomForest, Ridge, Lasso
    target: 'next_close'      # Options: next_close, next_return
    feature_mode: 'auto'      # Options: auto, manual

batch_manager: {}

cultural_trend_analyzer:
  trend_decay_factor: 0.95
  epidemic_beta: 0.3
  epidemic_gamma: 0.1
  sentiment_window_days: 30

public_sentiment_scraper:
  sources:
    "google_news": true
    "news_api": true
    "reddit": true
    "twitter": true
    "yahoo_finance": true
    "bloomberg": true
    "finviz": true
    "investing": true
  headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36"
    Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8"
    Accept-Language: "en-US,en;q=0.5"
  history:
    cache: {}
  rate_limit: 1.5  # Seconds between requests to same source
  cache_duration: 3600  # Cache duration in seconds (1 hour)
  use_transformers: true  # Use transformer models for sentiment
  transformer_model: "mrm8488/distilroberta-finetuned-financial-news-sentiment-analysis"
  sentiment_lexicon_path: "src/agents/language/templates/sentiment_lexicon.json"

data_quality_monitor:
  source_reliability:
    alphavantage: 0.95
    finnhub: 0.92
    yahoofinance: 0.85
  fallback_triggers: []

finance_memory:
  max_size: 5000
  eviction_policy: "LRU"
  checkpoint_dir: "finance/checkpoints"
  checkpoint_freq: 500
  auto_save: True
  tag_retention: 30
  priority_levels':
    low: 0
    medium: 1
    high: 2
  priority_map: {}

shared_memory:
  max_memory_mb: 200
  default_ttl: 300
  max_versions: 5

circuit_breaker:
  threshold: 5
  reset_timeout: 300

finance_agent:
  default_symbol: "CZR" # or ["NVDA", "MSFT", "AAPL", "AMZN", "GOOGL", "APA", "IVZ", "MHK", "ENPH", "CZR"]
  interval: 60  # seconds
  lookback_days: 180
  signal_threshold: 0.02
  backtest_lookback: 365
  training_mode: True
  render_simulation: true
  simulation_mode: False
  action_threshold: 0.05  # 5% change threshold for position closing