<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLAI Hub</title>
    <style>
        :root {
            --slai-yellow: #eacb00;
            --bg-dark: #0e1012;
            --text-white: #ffffff;
            --wheel-radius: 280px; /* Adjusted radius so it doesn't cover too much page */
            --app-size: 200px;
            --app-distance: 25px; /* Fixed distance from the wheel's edge */
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
            user-select: none;
        }

        /* Tech Background Layer */
        .background-stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 30% 40%, rgba(255,255,255,0.4), rgba(0,0,0,0)),
                radial-gradient(2.5px 2.5px at 50% 10%, rgba(255,255,255,0.7), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 70% 50%, rgba(255,255,255,0.3), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90% 30%, rgba(255,255,255,0.6), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 20% 80%, rgba(255,255,255,0.5), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40% 70%, rgba(255,255,255,0.9), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 60% 90%, rgba(255,255,255,0.4), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 80% 80%, rgba(255,255,255,0.7), rgba(0,0,0,0));
            background-size: 400px 400px;
            background-repeat: repeat;
            opacity: 0.6;
        }

        /* Background Big Geometric Logo */
        .bg-logo {
            position: absolute;
            top: 40px;
            right: 80px;
            width: 45vw;
            max-width: 600px;
            height: 45vw;
            max-height: 600px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.95;
        }

        /* Subtle Mountains Silhouette */
        .mountains {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 45vh;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 50" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path d="M0,50 L8,35 L18,45 L32,15 L45,35 L65,5 L85,30 L100,10 L100,50 Z" fill="%23141619" opacity="0.9"/><path d="M0,50 L12,40 L25,48 L40,25 L55,42 L75,15 L90,38 L100,20 L100,50 Z" fill="%231a1d21" opacity="0.6"/></svg>') no-repeat bottom center;
            background-size: 100% 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Top Navigation Header */
        header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .hamburger {
            width: 36px; height: 24px;
            display: flex; flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }
        .hamburger span {
            width: 100%; height: 4px;
            background-color: var(--text-white);
            border-radius: 2px;
        }

        .logo {
            font-family: "Georgia", serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .text-yellow { color: var(--slai-yellow); }

        .search-icon {
            width: 26px; height: 26px;
            cursor: pointer;
            transition: stroke 0.2s;
        }
        .search-icon:hover { stroke: var(--slai-yellow); }

        .login-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: 2px solid var(--text-white);
            color: var(--text-white);
            font-family: "Georgia", serif;
            font-size: 18px;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .login-btn svg { width: 16px; height: 16px; fill: var(--slai-yellow); }
        .login-btn:hover { background: rgba(255, 255, 255, 0.1); }

        /* Main Left Text */
        .hero-text {
            position: absolute;
            top: 25%;
            left: 15%;
            z-index: 10;
        }
        .hero-text h1 {
            font-family: "Georgia", serif;
            font-size: 42px;
            font-weight: 700;
            line-height: 1.4;
            margin: 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: flex-start;
        }
        .hero-title-right {
            display: flex;
            flex-direction: column;
        }

        /* --- THE WHEEL & APPS --- */

        /* The Pivot Point perfectly matches the center bottom of the page */
        #wheel-pivot {
            position: absolute;
            bottom: -10%;
            left: 50%;
            width: 0; 
            height: 0;
            z-index: 10;
        }

        /* The container that rotates around the pivot */
        #rotator {
            position: absolute;
            top: 0; 
            left: 0;
            width: 0;
            height: 0;
            will-change: transform;
        }

        /* SVG Wheel Background */
        #wheel-svg {
            position: absolute;
            /* Center the 800x800 SVG perfectly on the pivot point */
            left: -500px;
            top: -500px;
            width: 1500px;
            height: 1000px;
            pointer-events: none;
        }

        /* App Items */
        .app-item {
            position: absolute;
            /* Center the app on the pivot initially */
            left: calc(var(--app-size) / -2);
            top: calc(var(--app-size) / -2);
            width: var(--app-size);
            height: var(--app-size);
            transform-origin: center center;
            cursor: pointer;
            pointer-events: auto;
        }

        .app-img {
            width: 100%; 
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            border: 4px solid transparent;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            background-color: #222;
            transition: border-color 0.3s ease, transform 0.3s ease;
        }

        /* Tooltip Container placed securely at the top center of the app */
        .tooltip-container {
            position: absolute;
            top: 0; 
            left: 50%;
            width: 0; 
            height: 0;
            overflow: visible;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 15;
        }

        .app-item:hover .tooltip-container {
            opacity: 1; 
            visibility: visible;
        }

        .app-item:hover .app-img {
            border-color: var(--slai-yellow);
        }

        /* The yellow dot attached to the app edge */
        .tooltip-dot {
            position: absolute;
            top: -6px; /* Exactly centers the 12px dot on the app's top border */
            left: -6px;
            width: 12px; 
            height: 12px;
            background-color: var(--slai-yellow);
            border-radius: 50%;
            border: 2px solid var(--bg-dark);
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* The text wrapper that gets counter-rotated so it stays upright */
        .tooltip-text-wrapper {
            position: absolute;
            bottom: 12px; /* Hover just above the dot */
            left: 0;
            white-space: nowrap;
            display: flex;
            justify-content: center;
            will-change: transform;
        }

        .tooltip-text {
            color: var(--slai-yellow);
            font-family: "Georgia", serif;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 6px rgba(0,0,0,0.9);
        }

    </style>
</head>
<body>

    <!-- Tech Space Background Layer -->
    <div class="background-stars"></div>
    
    <!-- Logo -->
    <img class="bg-logo" src="component/assets/home_active.png" />

    <!-- Mountain Silhouette -->
    <div class="mountains"></div>

    <!-- Top Navigation -->
    <header>
        <div class="nav-left">
            <div class="hamburger">
                <span></span><span></span><span></span>
            </div>
            <div class="logo">
                <span class="text-yellow">SLAI</span> <span class="text-white">Hub</span>
            </div>
        </div>
        <div class="nav-right">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <button class="login-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                </svg>
                login
            </button>
        </div>
    </header>

    <!-- Main Message -->
    <div class="hero-text">
        <h1>
            <span class="text-yellow" style="margin-right: 18px;">SLAI:</span>
            <span class="hero-title-right">
                <span>The future of</span>
                <span>intelligent automation</span>
            </span>
        </h1>
    </div>

    <!-- Wheel and App Ecosystem -->
    <div id="wheel-pivot">
        <div id="rotator">
            
            <svg id="wheel-svg" xmlns="http://www.w3.org/2000/svg">
                <!-- Elements will be injected via JS to ensure perfect alignment -->
            </svg>
            
            <!-- App elements are injected here dynamically -->

        </div>
    </div>

    <script>
        // --- Wheel Configuration ---
        const R = 480; // Radius of the wheel itself
        const appSize = 240; // App square size
        const appDistance = 30; // Fixed distance between wheel edge and the app
        const itemSpacing = 30; // Degree spread between apps

        // Exact distance from the pivot to the center of each app
        const appTranslationRadius = R + appDistance + (appSize / 2);

        const itemsData = [
            { name: 'MusAI', img: 'component/assets/musician_active.png' },
            { name: 'BuildUp', img: 'component/assets/BuildUp.png' },
            { name: 'Documaster', img: 'component/assets/Docmaster.png' },
            { name: 'SignalSentry', img: 'component/assets/SignalS.png' },
            { name: 'ContentOps Autopublisher', img: 'component/assets/Autopublisher.png' },
            { name: 'Colony Clerk', img: 'component/assets/colony.png' }
        ];

        // --- Build SVG Wheel ---
        const svg = document.getElementById('wheel-svg');
        const cx = 500, cy = 500; // Center coordinates inside the 800x800 SVG
        const svgNS = "http://www.w3.org/2000/svg";

        // 1. Draw solid dark background circle
        const circle = document.createElementNS(svgNS, "circle");
        circle.setAttribute("cx", cx);
        circle.setAttribute("cy", cy);
        circle.setAttribute("r", R);
        circle.setAttribute("fill", "#0e1012");
        circle.setAttribute("stroke", "white");
        circle.setAttribute("stroke-width", "4");
        svg.appendChild(circle);

        // 2. Draw perfectly contained radial lines
        // A line every 10 degrees
        for (let a = 0; a < 360; a += 10) {
            const rad = a * Math.PI / 180;
            // Lines end precisely at the edge of the circle (R)
            const x2 = cx + R * Math.sin(rad);
            const y2 = cy - R * Math.cos(rad);

            const line = document.createElementNS(svgNS, "line");
            line.setAttribute("x1", cx);
            line.setAttribute("y1", cy);
            line.setAttribute("x2", x2);
            line.setAttribute("y2", y2);
            line.setAttribute("stroke", "white");
            line.setAttribute("stroke-width", "2");
            svg.appendChild(line);
        }

        // --- Build Apps ---
        const rotator = document.getElementById('rotator');
        
        itemsData.forEach((data, index) => {
            // Index 2 is "Homey 1.0", setting it to 0 angle (straight up)
            const angle = (index - 2) * itemSpacing; 
            
            const el = document.createElement('div');
            el.className = 'app-item';
            
            // Align app centerline perfectly to the center of the wheel
            el.style.transform = `rotate(${angle}deg) translateY(-${appTranslationRadius}px)`;
            
            el.innerHTML = `
                <div class="tooltip-container">
                    <div class="tooltip-text-wrapper" data-baseangle="${angle}">
                        <div class="tooltip-text">${data.name}</div>
                    </div>
                    <div class="tooltip-dot"></div>
                </div>
                <img class="app-img" src="${data.img}" alt="${data.name}">
            `;
            
            rotator.appendChild(el);
        });

        // --- Wheel Interaction ---
        let targetRotation = 0;
        let currentRotation = 0;
        const maxRotation = 90; // Prevent scrolling off into infinity

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            // Scroll Up -> Rotate Clockwise (+)
            // Scroll Down -> Rotate Counter-Clockwise (-)
            if (e.deltaY < 0) {
                targetRotation += 10; 
            } else {
                targetRotation -= 10;
            }
            
            // Clamp rotation
            if (targetRotation > maxRotation) targetRotation = maxRotation;
            if (targetRotation < -maxRotation) targetRotation = -maxRotation;
        }, { passive: false });

        // --- Smooth Animation Loop ---
        const tooltips = document.querySelectorAll('.tooltip-text-wrapper');

        function animate() {
            // Interpolation for buttery smooth momentum
            currentRotation += (targetRotation - currentRotation) * 0.08;
            
            // Apply main rotation to the rotator container
            rotator.style.transform = `rotate(${currentRotation}deg)`;
            
            // Counter-rotate the tooltip text so it always remains perfectly upright
            tooltips.forEach(tooltip => {
                const baseAngle = parseFloat(tooltip.dataset.baseangle);
                const absoluteAngle = baseAngle + currentRotation;
                tooltip.style.transform = `translateX(-50%) rotate(${-absoluteAngle}deg)`;
            });
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
